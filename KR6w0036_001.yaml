body:
  text: 八識大㫖識謂了別為義其數有八故曰八識謂一眼二耳三鼻四舌五身六意七未那八阿賴耶也一眼識者眼根為所依色境為所緣以生了別故名眼識從所依而得名乃至第六亦皆然焉何等眼根謂四大種所造眼識所依清淨色也眼者照了能照色境根者增上及出生為義為增上緣能生眼識故名為根乃至身根等亦准之然眼等根非現量得以能發識比知是有斯乃以果知因由用比體也何等為色謂顯形表又釋此三開為三十一謂開顯為十三青黃赤白影光明暗烟塵雲霧空一顯色開形為十長短方圓粗細高下若正若不正開表為八取捨屈申行住坐臥也四顯色實餘色皆假眼識所緣唯是實境不緣假境二耳識者耳根為所依聲境為所緣生了別用故名耳識何等耳根謂四大種所造耳識所依清淨色也耳者能聞故名耳根何等聲境謂內聲外聲內外聲可意聲不可意聲俱相違聲等也響聲假餘聲實耳識緣實不緣假境三鼻識者鼻根為所依香境為所緣而生了別故名鼻識所依淨色謂之鼻根能𪖻為鼻香謂好香惡香平等香和合香變異香等也四舌識者舌根為所依味境為所緣生了別用故名舌識所依淨色名曰舌根能嘗為義除飢渴故味謂苦酢甘辛醎淡或可意或不可意或俱相違或俱生或和合或變異不見香味通假之言雖無明文以理推之亦得有假如和合香可許是假故瑜伽論五十四云空行風中無俱生香唯假合者既云假合明知是假味中必有和合之味類香通假五身識者身根為所依觸境為所緣以生了別故名身識所依淨色謂之身根身者積聚及依止義諸根大造並皆積聚今此身根為彼多法依止積集所以獨得身根之名觸謂能造大種所造假觸地水火風謂之能造堅徑為地流濕為水溫熱為火輕動為風所造觸者謂滑性歰性輕性重性耎性緩急冷飽力劣悶癢粘病老疲息勇所造是假四大是實問五識不緣假長短等色非眼得澀滑等觸既是假亦應不為身識得答長短之色相待踈是以不為眼識得澀等諸觸分位假親故所以身根得或同假色唯意所得已上五者合名五識種類相似故總之如何相似謂有五似一謂俱依色根二同緣色境三俱但緣現在四俱現量得五俱有間斷六意識者謂依末那了別諸法故名意識末那翻意即是第七識之稱也諸法謂色法心法有法無法等三世諸法也分別此識當有其四謂明了意識定中意識獨散意識夢中意識初亦名曰五俱意識後三總名獨頭意識五俱意識助五令起亦令五識明了取境定位意識唯是現量散位獨頭通比非量與五俱意或唯現量或通現比及非量攝七未那識謂依賴耶緣彼見分比翻云意思量為義用彼為性及為行相恆審思量所執我相恆言簡前第六識意識雖審思而非是恆有間斷故次審思言復簡第八第八雖恆非審思故恆審思量雙簡五識彼非恆起非審思故此名何異第六意識此持業釋彼依主釋八阿賴耶識謂依未那緣於種子有根身器界何為種子謂本識中親生自果㓛能差別此與本識及所生果不一不異體用因果理應爾故雖非一異而是實有假法如無非因緣故漏無漏種各有二類一者本有謂無始來異熟識中法爾而有生蘊處界㓛能差別二始起謂無始來數數現行熏習而有諸有情無始時來有無漏種不由熏習法爾成就後勝進位熏令增長無漏法起以此為因無漏起時復熏成種有漏法種類此應知無漏識緣無漏種子有漏識緣有漏種子有根身者謂五色根及根依處五根如向根依處者扶塵根也器界即是色等五境內自種子為其因緣心內所變現行四大為增上緣造根境色非是心外實大所造問曰且如色中形影假法第八緣否答曰不緣假法唯緣實境而已阿賴耶此翻曰藏具有能藏所藏執藏義故謂與雜染互為緣故有情執為自內我故能持染種種名所藏此識是能藏是雜染法所熏所依染法名能藏此識為所藏為染第七等所執藏以為內我名執藏義也第七八識行相微細內緣相續無始已來常無間斷第七非量第八現量也現等三量三量者何也謂現量比量非量也現量謂無分別若有正智於色等境離名種等所有分別現現別轉故名現量所謂正智簡何邪智謂患翳目見於毛輪第二月等雖離名種等所有分別而非現量故現體非一名為現現附自境體離貫通緣名為別轉比量謂於所比義有正智生了知有火或無常等是名比量以其因有現比不同果亦兩種火無常別了火從烟現量因起了無常等從所作等比量因生此二望智俱為遠因藉此二因緣因之念為智近因是近及遠比度因故俱名比量非量謂似現似比總名非量似現量者有分別智於境異轉謂見杌為人覩見陽炎謂之為水及瓶衣等名曰異轉不以本自相四塵為所緣但於共相瓶衣假法而轉謂為實有故名分別由彼瓶衣依四塵假但意識緣共相而轉實非眼識現量得自謂眼見瓶衣等名似現量又但分別執為實有謂自識現得亦名似現不但似眼現量而得名似現量諸似現量遍在有分別無分別二心有分別心𡚶謂分明得境自體無分別心不能分明證境相故名似現以據決定唯分別非無分別心皆唯現量故似比量者謂若似因智為先所起諸似義智名似比量如於霧等𡚶謂為烟邪證有火由彼邪因𡚶起邪智不能正解是真之流而非真故名似比量相等四分於心心所若細分別應有四分所謂四分者何也謂相分見分自證分證自證分也相謂相狀也所緣為義縱緣於心以心為相亦唯所緣相分之心不能緣故色塵有青黃等相狀聲塵有執受非執受等相狀香塵有香臰差別味塵有甘辛等相狀緣觸有堅濕等相狀第六識緣法塵隨則有色心相狀第七識緣第八見分𭘧我法之相狀第八識緣種子五根器界𭘧其相狀也見謂見照也能緣為義心性明了能照前境名之為見自證者此緣自用故名自證即見分名曰自用見分是第三分緣外之用也亦名自體分對餘三分以名自體證自證者第三體用名為自證此第四分能證知彼是故名曰證自證分也第二分唯緣第一第三能緣第二第四第四唯緣第三相分見分自體三種即所能量量果別也如以尺丈量於物時物為所量尺為能量解數之智名為量果心等量境類亦應然果是何義成滿因義謂第二分以第三為果自為能量第三緣見以第四為果能量可知緣第四時以誰為果此義應思即以所緣第四為果第四緣第三為果例此同故功能應爾耳四分是識之義用分是非體名強其體即自證分也此四分中前二是外後二是內初唯所緣後三通二第二分通現等三量第三第四皆現量攝自共二相諸法自體唯局法體不通於餘唯證智知言不及是名自相通在諸法如縷貫華言所及假智所緣是為共相如五蘊中以五蘊事為自相空無我等理為共相分蘊成處色成於十處名為自相蘊名共相一色蘊該十故於一處中青黃等類別類名自相處名共相於一青等類中有多事體果青非華等以類為共相事名為自相一事中有多極微以事為共相以極微為自相如是展轉至不可為自相唯有自相共相體性都是無有若共相唯有觀心能緣行解謂之觀心自相之境現量所緣共相之境比量所緣三種分別自性及隨𫝹計度謂之三分別自性謂於現在所受諸行自相行分別此有二一尋伺為體雜集第二云唯在意識者是也二非尋伺為體通在八識唯識第五攝論第一許五識有者是也隨念謂於昔曽所受諸行追念行分別尋伺為體唯在第六計度謂於去來今不現見事思搆行分別此有二一尋伺為體緣三世境局在第六二體非尋伺依思惠立緣現在境通在六七二識諸識所依若夫五識俱有所依定有四種一同境依謂五色根共取現境故得此名二分別依謂第六識與依同緣分別境故三染淨依謂第七識五識以由此識染汙而成有漏由此識淨而成無漏故得此名四根本依謂第八識五識依此而得生故初不共依餘三共依謂彼此同依非一識依名為共依唯一識依非餘識依名不共依第六意識俱有所依唯有二種謂七八識初不共依後是共依問五八皆依於第七識何故今稱六不共依耶答五八依七非近所依六依第七是近所依以相順故同計度故謂多引六起染執等由第七故六緣境時七與力故七若無漏六亦無漏七若有漏六非無漏非七緣境第六與力是故第七是第六識不共所依第七末那俱有所依但有一種謂第八識阿賴耶識俱有所依亦但一種謂第七識皆不共依謂第七八行相微細無始相續常無間斷任運一類非分別起謂之任運無始不改謂之一類如何不改謂有四義一三受不易二三性不易三境界不易四相續不易有於此等不共餘識所以互為不共所依諸識生緣眼識現行若依肉眼具九緣生所謂空明根境作意根本第八染淨第七分別俱六能生種子若依天眼唯除明空耳識依八除明鼻舌身三依七除空第六依五根境作意根本第八能生種子第七八識以四緣生謂俱有依所緣作意能生種子無根本依即是第七俱有所依而第八識自體而已由五轉識行相麁動所藉衆緣時多不具故起時少不起時多緣多難辨不可恆具緣外曰麁浮囂曰動或行相易知謂之麁由緣外境數加轉易謂之動雖種子恆外緣合者有頓漸故起五或四三二一生不定故或俱不俱第六意識雖亦麁動兼又有細所藉衆緣無時不具唯由違緣有時不起五位無心謂之違緣曰無想天曰無想定曰滅盡定曰極睡眠曰極悶絶第七八識行相微細所藉衆緣一切時有緣少易辨故無緣礙令總不行若第七識無漏定唯染一分不得現行非體總無不同第六以麁動故為緣礙也有覆無記其性染汙而非善𢙣謂之有覆無記覆謂染法覆障為義聖道故又能蔽心令不淨故覆蔽為義問諸不善性亦能聖豈非有覆答據聖道亦可名覆招果勢用轉強勝故不名有覆問若爾無想不感果報而能應名有覆答自性染法勝聖道故名有覆無想報等翳理微故不名有覆無覆無記其性非染亦非善𢙣故名無覆無記此中有四所謂異𤎼威儀工巧及變化心異𤍨何也異𤎼習氣為增上緣感第八識酬引業力恆相續故立異𤎼名感前六識酬滿業者從異𤎼起名異𤎼生不名異𤎼有間斷故即前異𤎼及異𤎼生名異𤎼果若法異𤎼從異𤎼起無間斷遍名為異𤎼及異𤎼生謂第八識從自前念及種起故若法異𤎼從異𤎼起有間不遍名異𤎼生不名異𤎼謂前六識之為業所感者若非異𤎼有間不遍雖異𤎼起不名異𤎼及異𤎼生謂餘善等三性諸法問何故名曰異𤎼果耶答異𤎼是果之名異𤎼郎果持業得名問何故名果以為異𤎼耶答因是善𢙣異果無記是故名因曰異異所𤎼果名為異𤎼依主得名或名果曰異果是無記異因善𢙣異即是𤎼持業得名矣威儀無記具云威儀路心行住坐臥名為威儀此用色香味觸為體此威儀是心之所緣故名為路威儀即路名威儀路心或緣之或亦發之是故名曰威儀路心威儀路之心也工巧無記具云工巧處心刻鏤等名身工巧歌詠等名語工巧若身工巧四塵為體若語工巧以聲為體此工巧者心之所緣故名為處工巧即處也心若緣若發故名工巧處心工巧處之心也變化無記者變化五塵之心若是無記名變化無記此能變化心從通而生亦名通果無記矣瑜伽五十五云又異𤎼生一向無記二三可得一有二種若依伎樂以染汙心發起威儀是染汙性若依寂靜即是善性若依染著發起工巧是染汙性若善加行所起工巧即是善性為引導他或為利益而起變化當知是善矣今且唯取其無記者所以名曰四無記耳四無記種問四無記心為是一種逢緣起別為各有種答此有二解一云有同別種若是異𤎼無記心種逢緣引別分成三心故瑜伽中名世俗以變化心不通異𤎼便非世俗若以自力能熏成者即各別種但言世俗無唯言故二云三各定別設自不熏由他緣熏所緣境別故各成種言世俗者有緣發別發威儀等名威儀等即是實有緣威儀等名威儀等即是世俗雖是異𤎼由緣此等名威儀等善等三性三性者何也曰善曰不善曰無記也能為此世他世順益故名為善謂有漏善前世須益今世亦益今世順益後世亦益俱得樂果人天所仰無漏有為無為亦爾此世他世違越生有得有證及由涅槃獲二世益故並名善人天樂果雖於此世能為順益非於他世故不名善唯是無記於後世中作衰故矣能為此世他世違故名不善𢙣趣苦果雖於此世能為違而令身苦非於他世故非不善唯是無記矣問具修六度於現有苦廣捨竭財有飢寒等乃至修惠流血裂心云何而言二世皆益不善返此為難亦爾答又於他處而有益不唯約自又能破慳而長於貪亦名益故益義二世亦成矣於善不善益義中不可記別故名無記體非殊勝不能記別此有二類有覆無覆於無覆中亦分為四異𤎼威儀工巧變化也善等界繫瑜伽五十四云欲界有四心善心不善心有覆無記心無覆無記心色界有三心除不善無色界有三心亦除不善顯揚十八云欲繫有八心一生得善二方便善三不善四有覆無記及無覆無記分為四種謂異𤎼威儀工巧變化色繫有六心除不善工巧無色繫有四除不善威儀工巧變化心然顯揚論中欲界有變化心或是業果或是上界似欲界故名為欲界而非許有欲定所引變化無記瑜伽五十四云欲界無覆無記有變化心唯是生得謂天龍等然無修果心矣諸識三性第八識是無覆無記第七識是有覆無記六轉識是通三性問第八無覆無記有理可知耶答異𤎼性故異𤎼若是善染汙者流轉還應不得成又此識是善染依故若善染者互相違故應不與二俱作所依又此識是所熏性故若善染者如極香臭應不受熏問第七有覆無記有理可知耶答此意相應四煩惱等是染法故障礙聖道故隱蔽自心名有覆如上二界諸煩惱等定力攝藏是無記攝此俱染法所依細故任運轉故亦無記攝此識相應四煩惱等雖無定力以所依識行相微故任運轉故不善故遍三性故亦無記攝問六識云何通三性耶答若與信等十一相應是善性攝與無慙等十法相應不善性攝俱不相應無記性攝六位心所遍行有五別境有五善有十一煩惱有六隨煩惱有二十不定有四謂之六位五十一心所也遍行五者一作意謂能警心為性於所緣境引心為業謂此警覺應起心種引令趣境故名作意雖此亦能引心所心是主故但引心二觸謂三和分別變異令心心所觸境為性受想思等所依為業謂根境識更相隨順故名三和觸依彼生令彼和合故為彼三和合位皆有順生心所功能名變異觸似彼起故名分別三受謂領納順違俱非境相為性起愛為業能起合離非二欲故四想謂於境取像為性設種種名言為業言設者安立之異名此中安立取像異名謂此是青非非青等作此分齊而取共相名為安立由取此像便起名言此是青等性類衆多故名種種五思謂令心造作為性於善品等伇心為業善等之因即善𢙣境由了此境相故思作諸業起善𢙣等事亦令心所造作以心勝故但作心問何故此五名遍行耶答一切心中定可得故此五心所具四一切謂一切性及地時俱一切性者三性之處皆得起故一切地者有尋等三地皆有故一切時者或一切有心皆有或無始不斷或緣一切境故總言時一切俱者定俱生故別境五者一欲謂於所樂境希望為性勤依為業所樂謂欲觀境於一切事欲觀察者有希望故若不欲觀隨因境勢任運緣者即全無欲二勝解謂於決定境印持為性不可引轉為業謂邪正等教理證力於所取境審決印持由此異緣不能引轉三念謂於曾受境令心明記不忘為性定依為業謂數憶持曾所受境令不失能引定故四定謂於所觀境令心專注不散為性智依為業謂觀德失俱非境中由定令專注不散依斯便有決擇智生心專注言顯所欲住即能住非唯一境不爾見道歷觀諸諦前後境別應無等持五惠謂於所觀境簡擇為性斷疑為業謂觀德失俱非境中由惠推來得決定故問此五何故名別境耶答緣別別境而得生故問定惠同轉一境何云別境答所緣境事多分不同故從多分名曰別境矣此五唯有初二一切不緣一切境亦非相續非心有即有故無時也又此未必並生故無俱焉善十一者一信謂於實德能深忍樂欲心淨為性對治不信樂善為業然信差別略有三種一信實有謂於諸法實事理中深信忍故二信有德謂於三寶真淨德中深信樂故三信有能謂於一切𠀍出世善深信有力能得能成起希望故由斯對治不信彼心愛樂證修世出世善此性澄清能淨心等以心勝故立心淨名二精進謂於善𢙣品修斷事勇悍為性對治懈怠滿善為業勇謂升進悍謂堅牢勇表精進簡諸染法悍表精純簡淨無記即顯精進唯善性攝三慙謂依自法力崇重賢善為性對治無慙止息𢙣行為業若亦依於周孔之書皆名貴法世禮儀故四愧謂依世間力輕拒暴𢙣為性對治無愧止息𢙣行為業有𢙣者名暴染法體名𢙣輕有𢙣者而不親拒𢙣法業而不作五無貪謂於有有具無著為性對治貪著作善為業三有曰有三有之因謂之有具六無瞋謂於苦苦具無恚為性對治瞋恚作善為業苦謂三苦苦具即彼能生苦者一切皆是七無癡謂於諸理事明解為性對治愚癡作善為業八輕安謂遠離麁重調暢身心堪忍為性對治惛沈轉依為業離重名輕調暢名安令所依身轉去麁重得安隱故若無漏者除有漏麁重是通三性若有漏者除煩惱麁重唯是染性九不放逸謂精進三根於所斷修防修為性對治放逸成滿一切世出世間善事為業非別有體無異相故離四切能無別用故十行捨謂精進三根令心平等正直無㓛用住為性對治掉舉靜住為業此無別體離彼四法無相用故離沉沒等初心平等遠離加行次心正直於染無怯後無㓛用據實而論初中後各有三且依增上初中後行謂行蘊簡受蘊捨故置行言十一不害謂於諸有情不為惱為性能對治害悲愍為業謂即無瞋於有情所不為損惱假名不害若夫無瞋實有自體不害依彼一分假立無瞋翻對斷物命瞋不害正違損惱物害無瞋與樂不害苦是謂此二麁相差別為顯慈悲二相別故利樂有情彼二勝故此之十一名曰善者唯善心中可得生故善唯有一謂一切地十遍善心輕安不遍要在定位方有輕安調暢身心餘位無故非一切俱非一切性及一切時其義易知煩惱六者一貪謂於有有具染著為性能障無貪生苦為業謂由愛力取蘊生故二瞋謂於苦苦具憎恚為性能無瞋不安𢙣行所依為業謂瞋必令身心熱惱起諸𢙣業不善性故三癡謂於諸理事迷暗為性能無癡一切雜染所依為業謂由無明起疑邪定貪等煩惱業能招後生雜染法故四慢謂恃己於他高舉為性能不慢生苦為業謂若有慢於德有德心不謙下由此生死輪轉無窮受諸苦故五疑謂於諸諦理猶豫為性能不疑善品為業謂猶豫者善不生故六𢙣見謂於諸諦理顛倒推度染惠為性能善見生苦為業謂𢙣見者多受苦故分此為五一薩迦耶見謂於五取蘊執我我所一切見趣所依為業二邊執見謂即於彼隨執斷常處中行出離為業三邪見謂謗因果作用實事及非四見諸餘邪執謗因者謂無與無愛樂無祠祀無妙行無𢙣行等謗果者謂無妙行及𢙣行業所招異熟謗作用者無此世間無彼世間無母無父無他生有情等謗實事者謂無世間真阿羅漢等四見取見謂於諸見及所依蘊執為最勝能得清淨一切鬪諍所依為業五戒禁取謂於隨順諸見戒禁及所依蘊執為最勝能得清淨無利勤苦所依為業今此五見名為𢙣者毀訾之名實有覆故此十煩惱體性根本能生諸惑故名本惑煩是擾義惱是亂義擾亂有情故名煩惱隨惑二十者一忿謂依對現前不饒益境憤發為性能不忿執杖為業謂懷忿者多發暴𢙣身表業故此即瞋恚一分為體離瞋無別忿相用故二恨謂由忿為先懷𢙣不捨結為性能不恨熱惱為業謂結恨者不能𭇥忍恆熱惱故此亦瞋恚一分為體三惱謂忿恨為先追觸暴熱佷戾為性能不惱䖧螫為業謂追往𢙣觸現違緣心便佷戾多發囂暴凶鄙麁言䖧螫他故此亦瞋恚一分為體四覆謂於自作罪恐失利譽隱藏為性能不覆悔惱為業謂覆罪者後必悔惱不安穩故此覆貪癡一分所攝不懼當苦覆自罪者癡之所攝恐失利譽覆自罪者貪之所攝五誑謂為獲利譽矯現有德詭詐為性能不誑邪命為業此即貪癡一分為體離二無別誑相用故六諂謂為網他故矯設異儀險曲為性能不諂教誨為業險者不實之名曲者不直之義此亦貪癡一分為體離二無別諂相用故貪名利故諂是貪分無智故諂即是癡分七憍謂於自盛事深生染著醉傲為性能不憍染依為業諸所知法亦名盛事醉者惛迷異名也此亦貪愛一分為體離貪無別憍相用故八害謂於諸有情心無悲愍惱為性能不害逼惱為業謂有害者逼惱他故此亦嗔恚一分為體離嗔無別害相用故九嫉謂殉自名利不耐他榮妬忌為性能不嫉憂戚為業此亦嗔恚一分為體離嗔無別嫉相用故十慳謂耽著財法不能惠𭤸祕為性能不慳鄙畜為業資具妻子榮位等事皆名為財理教行果皆名為法此即貪愛一分為體離貪無別慳相用故十一無慙謂不顧自法輕拒賢善為性能礙慙生長惡行為業十二無愧謂不顧世間崇重暴𢙣為性能㝵愧生長𢙣行為業十三不信謂於實德能不忍樂欲心穢為性能淨信惰依為業謂諸染法各有別相唯此不信自相渾濁復能渾濁餘心心所十四懈怠謂於善𢙣品修斷事中懶惰為性能精進增染為業於諸染事而䇿勤者亦名懈怠退善法故於無記事而䇿勤者於諸善品無進退故是欲勝解非別有性十五放逸謂於染淨品不能防修縱蕩為性不放逸增𢙣損善所依為業謂由懈怠及貪瞋癡不能防修染淨品法總名放逸非別有體十六惛沉謂令心於境無堪任為性能輕安毗鉢舍那為業別有自性惛沉別相謂即瞢重令俱生法無堪任故十七掉舉謂令心於境不寂靜為性能行捨奢摩他為業別有自性掉舉別相謂即囂動令俱生法不寂靜故十八失念謂於所緣境不能明記為性能正念散亂所依為業以念與癡之各一分為此心所別無自性十九不正知謂於所觀境謬解為性能正知毀犯為業非迷於境而暗鈍也但是錯謬邪解名不正知以惠一分及癡一分而為此體別無自性二十散亂謂於諸所緣令心流蕩為性能正定𢙣惠所依為業別有自體散亂別相謂𮜒擾令俱生法皆流蕩故掉舉散亂二用何別彼令易解此令易緣雖一剎那解緣無易而於相續有易義故此等二十何曰隨惑謂是煩惱等流性故是非前後等流之義同類所引謂之等流分此二十以為三類謂忿等十各別起故名小隨煩惱無慙等二遍不善故名中隨煩惱掉舉等八遍染心故名大隨煩惱小十大三定是假有無慙無愧不信懈怠掉舉惛沉散亂七種定是實有不定四者一悔謂𢙣作𢙣所作業追悔為性止為業此即於果假立因名以名𢙣作先𢙣所作業後方追悔故悔先不作亦𢙣作攝二睡眠謂令不自在昧略為性觀為業謂睡眠位身不自在心極暗劣一門轉故昧簡在定略別寤時令顯睡眠非無體用有無心位假立此名三尋四伺尋謂尋求令心忩遽於意言境麁轉為性伺謂伺察令心忩遽於意言境細轉為性此二俱以安不安住身心分位所依為業第六意識名曰意言意識所緣名意言境心所之境亦麁細轉而意是主勝故偏今此境者通一切境問何故意識名曰意言答此有三解一從喻即意識及相應法能取境故與言相似二從境言是聲性此言為意之所取性從言為名但名意言三從果由意能起言等故名意言此二心所俱依外門緣外境生麁細發言多依身語而轉故也並用思惠一分為體若離思惠別無自性此四心所於善染等皆不定故非如觸等定遍心故非如欲等定遍地故立不定名心所俱起五法五俱起謂於遍行中有隨一起餘四亦必俱起也九法必六俱謂於別境五不定四中有隨一起必與遍行五數俱起也九法定十四謂無明與八大隨惑必得俱起於是遍行五數亦必俱起也二十一十五謂除輕安餘十善除無明瞋餘八本惑小隨惑中諂誑憍三謂之二十一善十俱起遍行五亦必俱起故云十五本惑八中有隨一起無明八大隨惑遍行五亦必俱起故云十五諂誑憍中有隨一起無明八大隨惑遍行五亦必俱起故云十五也三法起十六謂輕安及無慚無愧謂之三法輕安若起餘十善遍行五亦必俱起故云十六無慙無愧必得俱起於是無明八大隨惑遍行五亦必俱起故云十六八法十七俱謂瞋及除誑諂憍餘七小隨惑謂之八法隨一若起無明八大隨惑中隨二惑遍行五亦必俱起故云十七樞要下頌云五法五俱起九法必六俱九法定十四二十一十五三法起十六八法十七俱是心所相應惠者應當悉王所相應八識名曰心王唯緣境之總相喻如主君五十一名曰心所亦緣別相譬如從臣心王所屬故名心所心心所法取境其相如何謂如師作模𦘕形况已弟子填采采於模填不離模故如取總相著采色時令媚好出如亦取別相是其取境之相貌而已時依緣事四義具故名相應時謂剎那是簡前後依謂依根即俱有無間是也簡別識緣謂所緣簡別見分事謂體事即簡體多第八識與遍行五心所相應如何此識非別境等心所相應互相違故謂欲希望所樂事轉此識任業無所希望勝解印持決定事轉此識瞢昧無所印持念唯明記曾習事轉此識昧劣不能明記定能令心專注一境此識任運剎那別緣惠唯簡擇德等事轉此識微昧不能簡擇故此不與別境相應此識唯是異𤍨性故善染汙等亦不相應𢙣作等四無記性者有間斷故定非異熟第七識與十八心所相應謂我癡我見我慢我愛遍行五數八隨煩惱并別境惠我見雖是別境惠攝而五十一心所法中義有差別故開為二惠是別境通三性九地故見唯染汙通九地等故既有寬狹別不同何故此識與餘心所不相應耶謂欲希望未遂合事此識任運緣遂合境無所希望故無有欲勝解印持曾未定境此識無始恆緣定事無所印持故無勝解念唯記憶曾所習事此識恆緣現所受境無所記憶故無有念定唯繫心專注一境此識任運剎那別緣既不專一故無有定善是淨故非此識俱有我見故餘見不生無一心中有二惠故如何此識要有我見二取邪見但分別生唯見所斷此俱煩惱唯是俱生修所斷故我所邊見依我見生此相應見不依彼起恆內執有我故要有我見由見審決疑無容起愛著我故瞋不得生忿恨等十行相麁動此識審細故非彼俱無慙無愧唯是不善此無記故非彼相應𢙣作追悔先所造業此識任運恆緣現境非悔先業故無𢙣作睡眠必依身心重昧外衆緣力有時暫起此識無始一類內執不假外緣故彼非有尋伺俱依外門而轉淺深推度麁細發言此識唯依內門而轉一類執我故非彼俱第六識五十一皆相應也廣緣內外三世諸法故前五識唯三十四心所相應謂遍行五別境五善十一本惑三即貪瞋癡也中隨二惑八大隨惑也問何故與餘心所不俱哉答慢等必由有隨念計度分別生故又由慢於稱量門起方勝負故疑猶豫簡擇門起見推求門起故非五識以五識無此等行相小十行相麁而且猛五識望彼細故不俱悔眠二者皆由強思加行方能起故非任運生故非五法尋伺以名身等義為所緣非五識身以名身等義為境故此不相應諸識界繫於八識中鼻舌二識唯在欲界不通上界眼耳身識唯在欲界初禪二地二禪已上五識皆無後三識遍三界而有苦等五受分受心所以為五受謂苦樂憂喜捨也樂喜領順境相謂適恱身名樂受適恱心者名喜受五識名身意識名心何故然耶五識各依色根而轉諸有色根不離身故雖意根亦不離身而轉非悉然生無色界有情意根離身而轉不同色根定不離身是故五根所生諸受合名身受唯依意者獨名心受苦憂領違境相謂逼迫身名苦受逼迫心者名憂受捨領中容境相於身於心非逼非恱名不苦不樂受苦樂尤重五識相應無分別故憂喜輕微意識相應有分別故諸識受俱七八二識唯捨相應第六意識五受相應眼等五識三受相應謂苦樂捨問第八唯捨相應有理可知耶答有七因緣是故捨受一此識行相極不明了是捨受相若苦等受必明了故二此識不能分別違順境相取中容境是捨受相若是餘受取違順故三由微細若是餘受行相必麁四由一類此行相定故成一類若是餘受必是易五相續而轉若是餘受必有間斷六由異𤍨故謂此相應受唯是異熟隨先引業不待現緣任善𢙣業勢力轉故苦樂二受是異熟生非真異熟待現緣故七有情恆執為內我故謂若苦樂二受相應便有轉變寧執為我問第四所謂一類者何也答此有多義一三受不易二三性不易三境界不易四相續不易故未轉前名為一類問第七唯捨受俱有理可知耶答有二因故謂一任運而恆二一類無變若夫餘受非是任運待現緣故亦有變異有易故問第六云何五受相應耶答諸逼迫受意識俱者於人天中恆名為憂非尤重故傍生界名憂名苦雜受純受有輕重故捺落迦中唯名為苦純受尤重無分別故諸適恱受意識俱者若在欲界初二靜慮近分名喜但恱心故若在初二靜慮根本名樂名喜恱身心故若在第三靜慮近分根本名樂安靜尤重無分別故捨受意識相應者通在三界若夫第三靜慮意識唯於末位捨受相應餘無有捨純樂地故那落意識唯於末位捨受相應對法等嗔於末位與捨俱故或無有捨唯苦相應問以何得知五識與三受俱也答易不定故皆容與三受相應間斷轉變謂之易欣戚捨行互相而起謂之不定五果體相一異熟果二等流果三離繫果四士用果五增上果謂之五果一異熟如前所若但言異熟即六識中報非真異熟攝若言異熟生亦攝別報二者等流謂習善等所引同類或似先業後果隨轉其隨先業而似轉者實增上果非同性果相似之義假名等流此果即通有漏無漏三者離繫謂無漏道斷所證善無為法四者士用謂諸作者假諸作具所辨事業如夫農作商賈事主書𦘕算數占卜等事由此成辦諸稼穡等財利等果名士用果五者增上果謂除前四餘所得果寬通有漏無漏等賴耶三相三相者何也謂自相果相因相也何曰自相謂阿賴耶此翻曰藏此識具有能藏所藏執藏義故謂之自相何曰果相謂此能引諸界趣生善不善業異熟果故名異熟識謂之果相何曰因相謂此能執持諸法種子令不失故名種子識謂之因相問異熟種子亦應此識自相何故偏藏是自相耶答此識自相雖有三位而彼藏名三位之中初位所攝又以是名我執所執過失重故是以偏所謂三位者何也謂此識體總有三位一我愛執藏現行位即七地以前菩薩二乘有學一切異生從無始來名阿賴耶此云執藏至無人執位二善𢙣業果位謂從無始乃至極解道時乃至二乘無餘依位名毗播迦此云異熟至無所知位三相續執持位謂從無始乃至如來盡未來際利樂有情位名阿𨹔那此名執持問既有三藏名阿賴耶故知藏名廣通三位何曰初位耶謂所藏義通第二位能藏亦通第三位答義雖具三正以執藏名阿賴耶若不爾者二乘無學八地已去應有此名問疏三末云此能執藏亦通無漏所藏不通無漏矣執藏何局初位耶答佛果第八平等性智之所緣執故云執藏非有妄執問此識果相應通三位何唯異熟耶答異熟名寬通初二故所以偏以約有漏不取佛果問此識具四果謂五果中除離繫果何唯異熟此識果相耶答等流增上士用三果可通餘法唯異熟果不通餘法是故偏如是三相俱取現行及一切種此與轉識互因果故我法二執於諸我執略有二種一者俱生二者分別俱生我執無始時來虛妄熏習內因力故恆與身俱不待邪教及邪分別任運而轉故名俱生此復二種一常相續在第七識緣第八識起自心相執為實我二有間斷在第六識緣識所變五取蘊相或總或別起自心相執為實我此二我執細故難斷後修道中數數修習勝生空觀方能除分別我執亦由現在外緣力故非與身俱要待邪教及邪分別然後方起故名分別唯在第六意識中有此亦二種一緣邪教所蘊相起自心相分別計度執為實我二緣邪教所我相起自心相分別計度執為實我此二我執麁故易斷初見道時觀一切法生空真如即能除於諸法執略有二種一者俱生二者分別俱生法執無始時來虛𡚶熏習內因力故恆與身俱不待邪教及邪分別任運而轉故名俱生此復二種一常相續在第七識緣第八識起自心相執為實法二有間斷在第六識緣識所變蘊處界相或總或別起自心相執為實法此二法執細故難斷後十地中數數修習勝法空觀方能除分別法執亦由現在外緣力故非與身俱要待邪教及邪分別然後方起故名分別唯在第六意識中有此亦二種一緣邪教所蘊處界相起自心相分別計度執為實法二緣邪教所自性等相起自心相分別計度執為實法此二法執麁故易斷入初地時觀一切法法空真如即能除煩惱所知煩惱者謂執遍計所執實我薩迦耶見而為上首百二十八根本煩惱及彼等流諸隨煩惱此皆擾惱有情身心能涅槃名煩惱即煩惱持業釋所謂百二十八者何也見所斷惑有其十種謂貪瞋癡慢疑身見邊見邪見見取見戒禁取見各欲界四諦之理故有四十色界諦有三十六每諦除瞋無色亦爾都有一百一十二更加修道十六種一百二十八也何為十六謂欲界六及上二界各五也貪瞋癡慢身邊二見謂之欲六上界無瞋故各有五等流隨惑即二十種此唯自性若據眷屬餘心心所及五蘊亦是也所知者謂執遍計所執實法薩迦耶見而為上首此頭數亦與煩惱同覆所知境無顛倒性能菩提名所知言所知者即一切法若有若無皆所知故此從所以立名所知之依主釋也若論正煩惱生空所知法空若論兼互通彼此當知聖教依勝用執我執法薩迦耶見體無有異同一種生而用有別故分為二唯煩惱發業潤生體是縛法其所知義即不然由煩惱縛諸有情恆處生補特迦羅我見起位彼法我見亦必現前我執必依法執而起如要迷杌等方謂人等故能持自體名為法即一切法皆持自體有常一用方名為我故非一切法皆是我如計外境為法非我及計內法有非一常是故人執必𭘧法執法執亦有不𭘧人執能遍計識若依安惠八識及諸心所有漏攝者皆能遍計虛𡚶分別為自性故執即通三性有漏之心無非執者五八識唯有法執七唯有人六通二種若有漏心不起執者即不可言虛𡚶分別若不執心名虛𡚶分別即無漏心應名虛𡚶分別之心既以此理明有漏心皆能遍計若計度惠麁五八無細者亦有由七識熏習分別力故八識生時變似我法護法不然所謂第六七心品執我法者是能遍計何以得然謂有三因一謂能遍計者計度分別五八既無計度分別故不起執二謂執我法者必是惠也非五八識恆與惠俱寧容有執三謂二執必與無明相應前六識中善性何得與無明俱癡無癡等性相違故不可相應由無始來第六七識橫計我法種種分別熏習力故八識生時變似我法問六七二識無有疑滯五八既無計度分別後識生時應無我法答若分別五八可得無我法相而由六七所染熏成五八生時𭘧我法相略述法相義卷中標目十一色法能造大種五種因力變異因緣二種造色瓶等假有不相離色大種得名共不共相共變不受用細辨共不共業不相應行三種成就命根細辨二無心定六種無為五位百法蘊等三科三科因由六種有漏三種有漏有漏正因分極無漏性等三境三種不隨三通情本性等同異二三合等三藏伽陀四分種子因等四緣種子二緣因果同時因果異時名言種子執非執受十二因緣無明細辨十一殊勝行支細辨五種熏發識等次敘愛取潤業潤生相貌中有愛潤能所引生緣起得名五姓各別三時教相定有七名聞等三惠四重出體故不故思增不增業定不定業三業四業定不四業决定三業五種故思福等三業
