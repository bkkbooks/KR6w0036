front:
  text: 重刻法相義序性相不異譬如水與波始無二致矣今學者不能推詳其本真紛然以自相是非如此者天下頗爾茲有良灮和尚性相圜通理智妙𨔶親於唯識論疏之中採集綱要勒作三卷目之曰略述法相義豈啻習法相者之為筌罤而已哉抑亦學法性者之為龜鑑也舊版既在武陵書肆近義山照公訂正重鏤梓而請余序之余不敏豈設能之雖然面遇此勝因何不喜而且讚哉終以所謂性相不異冠其卷𩠐冀使後學者於斯二門無惑矣貞享三年丙寅孟秋武陵沙門守拙書于洛陽之寓舍略述法相義卷上標目八識大㫖現等三量相等四分自共二相三種分別諸識所依諸識生緣有覆無記無覆無記四無記種善等三性善等界繫諸識三性六位心所心所俱起王所相應諸識界繫苦等五受諸識受俱五果體相賴耶三相我法二執煩惱所知能遍計識
