body:
  text: 十一色法色法有其十一謂眼耳鼻舌身色聲香味觸及法處所攝色也何名法處所攝色此有五種謂極略色極逈色受所引色遍計所起色自在所生色也極略色者即五色根五色境及四大種法處實色極微為性顯揚第五瑜伽五十四建立極微有十五種謂眼等根為五極微色等境五極微四大種四極微法處實色有一極微以此十五為極略色性極者至也窮也邊也略有二義一者總義總略衆色拆至極微名極略色略色之極依士得名二者小義拆諸根境至極小處名極略色色即極略或色之極略依士持業二釋隨應二釋雖成持業為勝以色是五種通名也極逈色者以空界色極微為體空界色中攝六種色謂明暗光影及逈色與空一顯色以空界色上下見別分成逈色及空一顯色拆此六色以至極微總名極逈色離礙方顯立以逈名雖明暗等亦是所拆明等是別逈色是總處所寬廣復能為依但稱極逈色不名極明等逈色空一顯色上下類殊俱空界色何以唯名極逈不曰極空恐濫計虛空亦是色性也又逈色通空色唯上不名極空但稱極逈極逈即色逈色之極逈之極色三釋隨應色既通名初後解勝也受所引色者即無表有義唯二以律儀不律儀無表為體處處皆法處無表唯此二故無表要在猛利思種一切處中望律儀等思皆下品何有無表有義亦以非律儀非不律儀無表為性處中亦有作誠勵意應有上思律儀若是容容應有中思既是熏種猛利義同成於無表何簡處中於二中既無顯文任意取捨受謂因教因師而領受也引謂依受而發起也受之所引而受所引即色離合二名即成兩釋定道二戒雖不從他教而得方便之時亦從師教不律儀戒或自邀期或從他受由此總名受所引又別解戒𢙣戒無表定由受起轉不隨心定道相從亦名受所引又雖得彼不定從他無表類同皆名受所引又有受得定得定道由此總名受所引遍計所起者影像色謂通三性獨散意識因計所變五根五塵定境色無用影像為體三性意識能遍計度境從此生名彼所起遍計之所起而所起即色亦通兩釋自在所生色者勝定力故於一切色皆得自在即以定所變色聲香味觸境為體定通無擁名為自在果從彼起名彼所生自在之所生而所生即色亦通二釋也能造大種有四大種能造諸色地水火風謂之四大種地謂堅徑性水謂流濕性火謂溫熱性風謂動性能造大種與所造色俱時而有互不相離謂若於堅色聚中唯有地界能作業用餘水火風唯有種子之所隨逐更待異緣方能作業謂如鑽彼乾木即便生火又如白蠟鉛錫金銀等物融消即流如是如是於水火風名想聚中如其所應次第亦爾內色聚中一切地等作業皆具可得於外得有各別地等諸聚問如四大種由自種子方得生起造色亦爾何故言諸所造色大種所造答若諸色根及諸心中有諸大種種子隨逐即有造色種子隨逐若諸大種所有種子能生果時彼造色種子亦生自果故造色大種所造五種因力四大種有五種因力曰生因曰依因曰立因曰持因曰養因也生因即是起因謂大種恆將𭘧生諸色若離大種色不得起依因即是轉因謂此造色依大種有若捨大種諸所造色無有㓛能據於別處立因即隨轉因謂由大種變異能依造色亦隨變異持因即是住因謂由四大種持諸造色相似相續而令不絶養因即是長因謂由大種養彼造色色得增長謂之五因也變異因緣由三因緣大種變異令所造色變異而轉一士夫用故二業所作故三由勝定故士夫用者謂由地大所拆觸故器有差別由差別故令所造色變異可得或由水所潤等火所熟等風所燥等令所造色變異可得業所作者隨業勢力先大種生後隨彼力色變異生由勝定者勝定力故先起大種然後造色變異而生也二種造色大種能生二種造色一自類差別二異類差別自類差別造色者謂諸大種造歰滑等由如是因如是緣故此諸大種各各變異而生以澀滑等是觸分位名曰自類差別異類差別造色者諸眼耳等五內色處四外色處法處一分唯除觸處謂之異類差別也瓶等假有問何緣故知色香味觸如是如是別安立中飲食車乘瓶瓫衣服莊嚴具等諸想事物皆是假有答由彼想物或於是處色等想物聚中而轉或於是處色等想物聚中不轉若於是處色等想聚有食想轉非於是處飲等想轉若於是處車乘想轉非於是處衣等想轉如是所餘諸假有想若轉不轉當知亦爾一切色香味觸想事遍於一切飲食車乘瓶瓫衣服莊嚴具等諸想事中無差別轉是故飲食車乘等皆是假有色香味觸是實物有不相離色不相離色有其三種一一處不相離二相雜不相離三和合不相離也一處不相離者謂諸大種及所造色同住一處能造所造更互相望大小量等互相涉入不相㝵處所無異名為同處無別極微一處而住名不相離且如一眼七物相望互相涉入同一處住謂眼身根色香味觸能造地大七各極微同一處也問所造有六能造何一答有二釋一云雖一地大通能造六故能造一也一云雖有六能造據地類同合而言也如言一眼七極微成而實一根有無量微但言七者據類談也能造亦爾二相雜不相離者如一眼根有多極微一根微處七物同住以此七物對彼七物雖非同處然相和雜鄰近而住名之為和七七各別名之為雜無間隔故名不相離三和合不相離者如多豆等雖以蜜等之所攝持和合一聚然不相涉入復是異大所造異聚相望故名和合無間隔故名不相離大種得名其性廣大能生諸色故名大種或種是類義也此四能為生等五因生起衆色種種類別大有四義一為所依故謂與諸造色為所依處二體性廣故謂體性寬廣於造色三形相大故謂大地大水大火大風其相廣大四起大用故謂成壞𠀍界作用最大以有四義各得大名四大即種𭘧數持業也虛空雖大不能為因內種子等雖能為因體相非大所餘諸法非大非種由此地等亦大亦種得名大種也共不共相且諸種子總有二種一是共相二不共相多人所感謂之共相雖知人人所變各別名為唯識以有相似共受用義為共相實非他用自變自用他變以不可緣心外法也然我此物為增上緣令多人可共受用如山河等是也唯自能用他不得用謂之不共如色根等是也共不共中總分為四共中有二一共中共如山河等非唯一趣用而他趣不能用二共中不共如己田宅及鬼等所見猛火等物餘人餘趣不能受用餘房衣等准此可知不共相中亦有二種一不共中不共如眼等根唯是自識依用非他所用二不共中共如自扶根塵他亦得受用也共變不共變諸法同在一處不相障礙譬如衆多燈明共在一室各各遍室一一自別其相相似處所無異燈眀既多人影亦多雖一燈去餘光尚遍故知涉入不隔其相似一雖似一相各各自別共變諸法喻而可知受用細辨問且有一有情伐用一樹為用自變為用他若唯局用自變餘人所變應存不亡若亦用他變違唯識理答樹等既是共相種生皆相隨順互有增益是故以他所變為增上緣用自所變當知於自所變親緣親用於他所變踈緣踈用自為所順他為能順由所順無能順亦問如燈明喻一燈光餘光猶在何故今言由所順無能順亦耶答喻取少分故不相違共不共業若業能令諸器𠀍間種種差別謂之共業能令有情𠀍間種種差別謂之不共業由共業種為增上緣共相種子得生現行由不共業種為增上緣不共相種子得生現行其㫖應知矣不相應行不相應行有二十四一得二命根三衆同分四異生性五無想定六盡定七無想異熟八名身九句身十文身十一生十二老十三住十四無常十五流轉十六定異十七相應十八勢速十九次第二十方二十一時二十二數二十三和合二十四不和合也一得者依諸有情可成諸法分位假建立得亦通非情無法無有二命根者依業所引異熟住時决定假立命根三衆同分者依諸有情相似分位立衆同分大論等中唯趣生上立彼同分諸論不外法之上亦立同分以理言之外有亦好教中且勝所依處非外無也四異生性者依未生起一切出世聖法分位建立異生性斯乃三界見所斷種子未永害量即通二不善無記二法之上假設之五無想定者謂有異生伏遍淨貪未伏上染由出離想作意為先令不恆行心心所滅想滅為首立無想名令身安和故亦名定六滅盡定者謂有無學或有學聖已伏或離無所有貪上貪不定由止息想作意為先令不恆行恆行染污心心所立滅盡名令身安和故亦名定七無想異熟者謂修彼定猒麁動力生彼天中違不恆行心及心所想滅為首名無想天此無想天非真異熟是異熟生諸論名無想異熟者依真第八異熟識生得種立故名異熟八名身九句身十文身者名詮法自性句詮法差別文躰是字為名句之所依不能詮自性及差別然依語聲分位差別而假建立名句文身如夫音言斫芻但言斫唯言芻未在所目為字分位若二連合能詮眼躰為名分位更添言阿薩和縛名為眼有漏為句位知依分位以立名等一名是名非名身二名名身如色聲三名已去名多名身如色聲香等一句是句非句身兩句是句亦句身三句已去名多句身一字是文非文身二字亦文亦文身三字已去名多文身身者聚集為義謂以合集總二三等名為聚集十一生十二老十三住十四無常者於衆同分諸行本無今有假立為生於衆同分諸行相續變異假立為老於衆同分諸行相續不變壞假立為住於衆同分諸行相續變壞假立無常十五流轉者謂於因果相續不斷假立流轉十六定異者謂於因果種種差別假立定異十七相應者謂於因果相稱假立相應十八勢速者謂於因果迅流轉假立勢速十九次第者謂於因果一一流轉假立次第二十方者謂於東西南北四維上下因果差別假立為方二十一時者謂於因果相續流轉假立為時二十二數者謂於諸行一一差別假立為數二十三和合者謂於因果衆緣集會假立和合二十四不和合者假立不和合翻對和合其義可知命根二定無想報異生性於心心所分位名句文方於色分位餘十五通於三法分位假建立之此二十四名不相應行者簡非色心及諸心所及簡無為不似色心質礙緣慮故名不相應生滅無常故名曰行或行蘊所攝不相應法故名不相應行謂行蘊有二一相應行即心所法二不相應行即得等也三種成就依諸有情可成諸法分位假立三種成就一種子成就二自在成就三現行成就種子成就者若所有染污法諸無記法生得善法不由㓛用而現行者染法未為奢摩他伏無記未為聖道永害生得未為邪見伏如是名為種子成就此等未行與不行皆名成就自在成就者若加行所生善法及一分無記增盛種子名自在成由加行力方得自在又成此時各自在者故此等名自在成加行善法謂世出世一切㓛德一分無記謂工巧處變化心威儀心極串習者除生得無記法現行成就者諸蘊處界若善不善無記現行名現行成就前二唯種此唯現行前一有漏後二各通有漏無漏問何故種分為二現唯立一答以種隱而難知離之為二現行顯而易了合而為一又影顯故命根細辨親生第八心王之名言種子由先世業所引持身之差別㓛能令色心等住時决定依此㓛能名命根非取生識之義若此種子無此㓛能身便爛壞現行本識由種力故生及與緣持根等法不名命根以非根本也二無心定於定加行猒患麁動心心所發勝期願云我欲或一日乃至七日或一劫或一劫餘無心心心所遂猒此心令心心所漸細漸微此猶遠加行也正欲入定至微微心時即是末後鄰次於定前剎那心熏異熟識成極增上猒心種子以前諸位雖熏成種以中下品未名為定由是增上猒心種子餘麁動心等於後念以去暫不現行依此一期無心分位假立二定此二定種無想有漏滅盡無漏以定前猒患種子為此定體六種無為一虛空二擇滅三非擇四不動五想受六真如謂之六無為虛空無為者謂空無我所顯真如有無俱非心言路絶與一切法非一異等是法真理即此真如離諸礙故名虛空擇無為者由無漏惠簡擇力故諸雜染即此真如名為擇非擇無為者此之本性不由慧能而性清淨名非擇或有為法緣闕不生不生之所顯真理名非擇不動無為者若離第三靜慮欲時得於一切苦樂受即此真如名不動想受無為者若離無所有處欲想受不行即此真如名想受真如無為者理非妄倒故名真如上五皆依真如假立真如亦是假設名其實非言詮之所及情識之所測而已五位百法一心法二心所有法三色法四心不相應行法五無為法謂之五位心法有八心所有法有五十一色法有十一心不相應行有二十四無為有六是其百法也蘊等三科三科即是五蘊十二處十八界也色受想行識謂之五蘊於色蘊中攝十一種色受蘊攝遍行中受數想蘊攝遍行中想數行蘊攝相應心所四十九法及攝不相應行二十四法識蘊唯攝心法八種五蘊總攝九十四法蘊謂積聚為義諸所有色若過去若未來若現在若內若外若麁若細若劣若勝若遠若近聚彼一切一色蘊乃至識蘊亦復如是無常已名過去若未已生名未來已生未謝名現在自身名內所餘名外有對名麁無對名細苦集染污名劣不染名勝去來名遠現在名近六根六境謂之十二處意處攝八識法處攝四類法謂法處所攝色有五種相應法有五十一不相應法有二十四無為法有六合有八十六法處謂識生長門之義斯乃能受所了境用也六根六境六識謂之十八界界謂能持為義六根六境能持六識所依所緣過現六識能持受用即是不捨自相也曾現見色及此種子積集異熟阿賴耶識是眼界相如眼界相耳鼻舌身意界相亦爾眼曾現見及眼界於此增上是色界相如色界相聲香味觸法界相亦爾依有色根增上力外境得生故云眼界於此增上也依眼緣色似色了別及此種子積集異熟阿賴耶識是眼識界相耳鼻舌身意識界相亦爾也處亦如界謂眼當見色及此種子等隨義應問假色亦是色法何故於十二處中攝在法處答以唯意緣當法處收以攝假隨真須從明攝之色處問五俱意識及第八識所緣色等境於十八界為五塵界攝為法界攝答若以境對根以六八所緣法界攝若以暗從明亦五塵界攝初門是界門實義也後門相從名五塵界處處解釋各依一門問現在七八二識為意識攝為意根界攝答此有二解一謂意根界攝一謂意識界攝問何故界處有無為蘊無無為耶答色等諸法有去來等種種差別總略積聚名為蘊常住之法無有此義是故無為非蘊所攝三科因由於愚根樂各有三種故蘊處界於愚有三或愚心所總執為我或唯愚色或愚色心根亦有三謂利中鈍樂亦三種謂樂略中及廣是故世尊如其次第為蘊處界三六種有漏曰漏自性曰漏相屬曰漏所曰漏所隨曰漏隨順曰漏種類謂之六種有漏出雜集論漏自性者即煩惱體漏性合故名為有漏由此煩惱在生故名漏性合漏體有用名為有漏煩惱現行令心連注流散不絶名之為漏如漏器漏舍深可猒𢙣汙處廣毀責過失立以漏名漏相屬者與漏相應及漏所依即染汙心心所名相應遍行別境及前七識與惑俱者眼等五根名漏所依有漏相屬名曰有漏漏所者謂有漏善法由漏勢力招集後有故名所此中亦攝六外境無記心對法論中且據善從能惑名為有漏漏所隨者謂餘地法但言漏隨不言者以他地法不相增益也從能隨惑名為有漏漏隨順者順决擇分異地不增同地得增雖增背有然與漏俱故名隨順或雖漏俱而不增益稱損力益能轉故然成有漏言增益者據餘漏漏種類者謂無學身諸有漏法以先有漏之所起名為種類三種有漏了義燈中解釋有漏有其三種一體是漏為有所有名為有漏斯乃上二界煩惱於三漏中言有漏者是也以上二界緣身起愛離外境貪彼內身名為有有之漏也二有他漏故名為有漏即能有三漏性合故亦煩惱自體由此煩惱在生中以漏即體有用名為有漏有即漏也有漏正因染汙末那是其有漏之正因也有漏之言正表漏俱謂諸有漏由與自身現行煩惱俱生俱互相增益方成有漏由此熏成有漏法種後時現起有漏義成自相續中六識煩惱與彼善等不得俱起雖由煩惱引等業唯是傍因而非正因表漏俱者取能有體不取煩惱有他漏故名為有漏問五相增益其相如何答末那與餘識互增益雜染問第七與六為雜染依應有增六六識如何增益第七答有二義一者增長二者不損若第六識業感八為彼依緣得相續住故名增益起有漏時設雖不能增長第七而不損害亦名增益斯乃對無漏起必損末那𨐫如睡眠雖於眼根不能增長而不損害亦名長養問互相增益亦通他地耶答自地互增他地不爾第六識緣三界為我不隨他地繫蓋此之謂也分極無漏佛果即是究竟無漏也諸漏永盡非漏隨增性淨圓明故名無漏諸餘無漏雖亦名無漏非究竟無漏謂一切有學二乘無學非圓非明也性等三境性境獨影境𭘧質境謂之三類境性境者從實種生有實體用能緣之心得彼自相名為性境如身在欲界第八所變五塵之境以實種生是因緣變名為性境眼等五識及五俱第六意識現量緣時得境自相則此相分亦是性境餘法准知獨影境者謂能緣心但獨變相無別本質第二或有杖質緣無為之相分是也雖有本質然彼相分不生本質以彼本質是不生法也此等相分但與能緣同一種生謂之獨影𭘧質境者謂能緣心緣所緣境有所杖質而不得自相謂之𭘧質境問性境亦𭘧本質何𭕜此境得𭘧質名答彼境不依能緣分別心境共真故得性名此𭘧質境以依分別非境自相故對獨影以名𭘧質三種不隨性境有三不隨一性不隨二種不隨三繫不隨也性不隨者雖有與能緣心同性是境自性不由能緣心力是此性等且如五識通三性相質俱無記不從於五亦通三性亦如五識身無記性者緣五塵境其性雖同而相見分各守自性不是隨彼能緣心故方成無記性餘皆准知種不隨者自有能生種子不從能緣種子而生也繫不隨者且如欲界繫五識緣自界五塵斯乃所緣五塵自是欲界繫非隨能緣心成欲界繫也三通情本𭘧質境即性種繫三各通情本性通情本者且如第七緣第八見分判此相分若從本質是無覆無記也若從能緣是有覆無記也種通情本者謂現行相分既隨見質名有覆無覆能生種子亦應隨應屬見質問𭘧質相分有別種子耶答爾也且如第七現相隨於見質遞於二性此相熏種種隨現相亦名二性後相依此二性種生是其種子相也界通情本者判此界繫應隨質見非自是此界繫者也性等同異或性雖同而繫種不同如在下地緣上界天眼耳或繫雖同性種不同如五識緣自界五塵或種雖同而繫不同約聚論之即有一法論之即無如第八識聚心所所緣與見同種心王所緣界繫不同如斯等類准思可知矣二三合等於三類境或有唯一或有二合或有三合謂唯一者各別三境也二合者如第八識緣自地散境心王所緣是初性境心所所緣是獨影境五識所緣自地五塵是初性境亦得是𭘧質之境如第六識緣過未五蘊得是獨影亦得是𭘧質之境熏成種子生本質故三合者如因第八緣定果色心所所緣唯是獨影心王所緣是實性境亦得為𭘧質之境第六所變定果之色為本質故如斯等類准思可知三藏伽陀三藏伽陀云性境不隨心獨影唯從見𭘧質通情本性種等隨應此頌出二執章及樞要上本也性境有三不隨故云不隨心獨影無有不隨故云唯從見𭘧質有三通情本故云通情本或於三類境有唯一二合三合等或於性種繫有同不同故云隨應四分種子於四分中後三分必同種生若見相二分有別種生有同種生有同異種生謂別種生者即性境也同種生者即獨影境也同異種生者即𭘧質境也問本質影像同別種如何答且依一義以別種為勝耳因等四緣有為諸法從因緣生如幻假有謂色法及諸種子依二緣生心法依四緣生所謂四緣者一因緣二等無間緣三所緣緣四增上緣也因緣者謂有為法親辨自果此體有二一種子二現行種子者謂本識中善染無記諸界地有漏無漏色非色報非報等㓛能差別能引次後自類㓛能及起同時自類果此唯望彼是因緣性現行者謂七轉識及彼相應所變相見性界地等除佛果善極劣無記餘熏本識生自類種此唯望彼是因緣生等無間緣者謂八現識及彼心所前聚於後自類無間等而開導令彼定生心所與心雖恆俱轉而相應故和合似一不可設離別殊異故得互作等無間緣心與心所如何似一同一所緣同一所依同一時轉同一性攝是故似一也所緣緣者謂若有法是𭘧己相心或相應所慮所託此體有二一親二踈若與能緣體不相離是見分等內所慮託應知彼是親所緣緣若與能緣體雖相離為質能起內所慮託應知彼是踈所緣緣增上緣者謂若有法有勝勢用能於餘法或順或違雖前三緣亦是增上而今第四除彼取餘有為無為皆有不障之力謂之勝勢用與違順法能得為緣謂之或順或違如何與違法得為緣如夫霜雪與違青之黃為增上緣非前法此順違用於四處轉生住成得四事別故種子二緣現行望自親所熏種能為二緣即因增上唯除第八及六識中極劣無記非能熏故與非親種以不辨體唯一增上種望親種亦具二緣於非親種亦一增上非唯有漏淨種亦爾也因果同時能熏識等從種生時即能為因復熏成種三法展轉因果同時如炷生熖熖生焳炷亦如束蘆更互相依因果俱時理不傾動矣因果異時前念種子生後念種斯乃自類相生因果異時不同種現相望因果同時名言種子名言種子有其二種一表義名言種子二顯境名言種子因名起種名表義名言種子表義名言即能詮義音聲差別非詮表聲是非名言然名是聲之屈曲差別唯無記性不能熏成色心等種以因名故心隨其名變似五蘊三性法等而熏成種雖亦有依句等而成熏習總為名詮召諸法名最勝故名言進退攝句字故不因名言熏成種子名顯境名言種子顯境名言即能了境心心所法即是一切七識見分等心非相分心此見分等實非名言能顯所了境如言名顯所詮法故名為名表義名言唯第六識緣之熏習餘皆不緣亦不能發顯境名言通前七識非第八識隨二名言所熏成種作有為法各別因緣執非執受於第八識所變三境如何分別執受非執受謂若約能生覺受有根身是執受種子及器界是非執受據實言之生覺受者唯是身根以餘四根色香味觸不離身根同聚一處亦名覺受若約安危共同種子及有根身是執受器界是非執受善趣名安𢙣趣名危第八若安種子有根身亦隨安穩第八若危種子有根身亦隨危𢀴故云共同執是攝義持義受是領義覺義攝為自體領受為境持令不壞能生覺受故名執受名非執受之可知矣十二因緣生相續由惑業苦發業潤生煩惱名惑能感後有諸業名業業所引生衆苦名苦惑業苦種皆名習氣前二習氣與生苦為增上緣助生苦故第三習氣望生苦能作因緣親生苦故此惑業苦應知總攝十二有支謂從無明乃至老一無明支者以行蘊中無明為體不取餘法斯乃與行得為因緣此通現行及種為體二行支者造作為行以身語意三行為體心心所為體行體是思此身語意三在欲界名福非福身語在色界意亦通無色名為不動此支亦通現行種子三識支者了別名識唯取阿賴耶識親因緣為體果報主故此唯種子不取現行四名色支者即除六根觸受法種皆名色攝謂色蘊中除根餘色除受蘊全除行蘊觸除識蘊中本識意根餘想蘊全三蘊少分為名色支體此唯異熟性也言名色者相違釋謂無色蘊名名色蘊名色何故無色蘊名名謂順趣種種所緣境義或依言名分別種種所緣境義故為名何故色蘊名色謂於彼彼方所種殖增長義及變礙義故為色五六處支者生長門義名為處是內六處唯取彼異熟種即五色根及前六識若有異熟居過去世為意也六觸支者觸境名觸除第七識取第八相應觸全六識之中異熟觸此唯種子七受支者領納名受此亦同前觸應知亦唯種子八愛支者耽染名愛唯取愛數一法為體正唯修斷助潤通見此通現種九取支者追欲名取通取一切煩惱正唯修斷助潤通見此通種現十有支者愛取合潤能引業種及所引因轉名為有俱能近有後有果故十一生者蘊起名生即五果現行不取種子以異熟五蘊為體謂從中有至本有中未衰變來皆生支攝十二老者變異名老無名亦以異熟五蘊為體不取種子也無明愛取是惑所攝行有一分是業所攝七有一分是苦所攝也前十是因後二是果如斯因果定不同世因中前七與愛取有或異或同若二三七各定同世也無明細辨此無明支取業者如勝鬘經有五住地即見一處欲色有及無明住地前四煩惱能諸業第五所知不能業於此五中唯取前四於業中有能通總別業者有但總報者有唯別報者今取兼總別及唯總報者不取唯別於中復有助正業通取助正正行者唯見所斷謂麁猛故助者不定謂助人天總報之業亦通修道助發𢙣趣總報之行多唯見斷別報等少亦通修又此無明通於相應不共纏及隨眠現行名纏種名隨眠現行分二與本惑俱名為相應不與本俱名為不共然多是主獨行迷因果理行相細故不同非主獨行無明十一殊勝雖諸煩惱皆能潤而業位無明力增以具十一殊勝事故如緣起經一所緣勝遍緣染淨故二行相勝隱真顯妄故三因緣勝惑業生本故四等起勝等能起能引所引能生所生緣起法故五轉異勝隨眠纏相應不共四轉異故六邪行勝於諦起增益及損减行故七相狀勝微細自相遍愛非愛共相轉故八作業勝作流轉所依事作寂止能事故九障礙勝障礙勝法及廣法故十隨轉勝乃至有頂猶隨轉故十一對治勝二種妙智所對治故矣所以不餘惑亦名業支也行支細辨或有一業唯感總報或有一業通感總別並是行支也順現受業別助當業皆非行支此皆唯能感別報果也感當業中別有一業唯感別報謂之別助當業五種熏名言熏習發識等種未必一時雖有前後雜亂不定於生果相未辨何前何者為後然此五種由業熏必是同時由行熏識業力種成令五種子一時轉變於生位能生自果而已識等次敘識等五種由業熏雖實同時而依主伴總別勝劣因果相異故諸聖教假前後謂本識為主異熟主故餘四為伴是助伴生就彼四中名色是總而體性寬餘三是別而義用狹就後三中六處以受等依是勝餘二以依處生是劣就後二中觸以能生受是因受以觸所生是果也或依當來生起分位現在已起分位有次第故有前後非行熏時及實生果有其前後謂續生時因識相顯次根未滿名色相顯次根滿時六處明盛依斯觸因觸起受爾時乃名受果究竟也愛取潤業愛能潤業取支亦爾且依初後分此二支要數溉灌方生有牙譬如麥等時時受潤而得生長雖諸煩惱皆能潤於潤業位愛力偏增雖取支中攝諸煩惱而愛潤勝故十地經是愛增也潤生相貌於潤生位有中生殊於潤中有起自體愛於潤生有起境界愛以於有不見中有謂我無有起自體愛於中有位見生處故起境界愛謂於彼業所得生處還見如是種類有情喜樂馳趣即於生處境色所礙中有終滅生有續起也中有愛潤若有於此非等引地沒已生時依中有位而起染汙意識結生相續謂男女互於父母之處起貪及恚而緣父母不淨謂為己有而生貪愛或緣當生有果起愛故得潤生中有染識滅時其異𤏅識託母胎中與赤白渧同一安危令相和雜成羯羅藍能所引生無明及行名能引支能引識等五果種故識等五種名所引支是前二支所引故愛取及有名能生支近生當來生老故生及老名所生支是愛取有近所生故緣起得名瑜伽論中釋緣起名有其五釋一云由煩惱繫縛往諸趣中數數生起故名緣起是依緣所起之處釋名二依託衆緣速謝滅已續和合生故名緣起此依剎那義釋名三衆緣過去而不捨離依自相續而得生起故名緣起四數數謝滅復相續起故名緣起此依數壞數滅義釋五於過去世覺緣性已等相續起故名緣起如世尊我已覺悟等起宣即由此名展轉傳故名緣起五性各別總分衆生有五種姓一菩薩二獨覺三聲聞四不定五無姓即是十卷入楞伽第二卷無上依經上卷善勇猛般若第一卷大般若第五百九十三卷五種姓大莊嚴論第一卷末種姓品及瑜伽第二十一聲聞地皆有五種姓別故知定有法爾差別種子也三時教相如來教隨機所冝機有三品不同教遂分三時諸異生類無明所肓起造惑業迷執有我於生海淪沒無依故大悲尊初成佛已仙人鹿𫟍轉四諦輪阿笈摩除我有執令小根等漸登聖位彼聞四諦而斷我愚尚於諸法迷執實有世尊為除彼法有執次於鷲嶺諸法空所謂摩訶般若經等令中根品捨小趣大彼聞世尊蜜義意趣無破有便撥二諦性相皆空為無上理由此二聖互執有空迷謬競興未契中道如來為除此空有執於第三時演了義教解深密等會一切法唯有識等心外法無破初有執非無內識遣執皆空離有無邊正處中道於真諦理悟證有方於俗諦中妙能留捨如瑜伽論七十六解深密經第三廣其相為對漸悟教三時若對頓悟無三時別若對漸悟即有年月前後次第若從所未必如是唯約義類相從以為三時若夫華嚴屬第三時豈拘時前後者哉定有七名定有七名一名三摩呬多此云等引通有無心唯定非散何故名曰等引謂引等故名等引以身心中所有分位安和之性平等之時名之為等由定力故引生此等或等所引故名等引以前加行入定之時制伏沉掉名之為等此等引生在定分位二名三摩地此云等持唯是有心而通定散謂以平等持心心所但於境轉名為等持三名三摩鉢底此云等至通有無心等引寬通攝一切有無心位諸㓛德法等至不爾何故名為等至謂至等故名等至定數勢力令身心等有安和相名之為等或等至故名等至由前加行伏沉掉等至此安和分位也四名馱那演那此云靜慮通攝有無心定漏及無漏染與不染依色四地定慧平等故名靜慮五名質多翳迦阿羯羅多此云心一境性即是等持也心專一境依教而緣證解所緣心便明淨非是定心唯緣一物即隨所注心多少境或一剎那別欲注心處深取所緣定即得生非要前後唯緣一境六名奢摩他此云止唯是有心淨定不通散位能止住心故名曰止七名現法樂住唯在靜慮根本非餘淨不通散從果得名也聞等三慧三慧有二別體義也別體三慧者一聞所成慧二思所成慧三修所成慧也聞所成慧依止於文但如其未善意趣謂依聽聞以文為先而觀義者也以聞為因因聞所成之慧名聞所成慧依士釋也思所成慧亦依於文不唯如能善意趣謂依思慮以義為先而觀文者也由思籌度勝慧方生因相應思所成之慧名思所成慧鄰近釋也或因於思所成之慧依主釋也修所成慧亦依於文亦不依文亦如其亦不如能善意趣謂依於修俱於文義證解明了也修者證義明證境故體即定數因定相應所成之慧鄰近釋也或因於定所成之慧亦依主釋也修慧是定聞思二慧是散非定義三慧者局在八地已上雖一慧體一剎那中義分為三實無別體但是修慧假聞思謂能取外境而尋於義名為聞惠能善籌度先理後文名為思慧於此二中能證明顯即名修慧聖智迅速於一念慧義分如此七地已前雖無漏心而聞教法或先文知義或先義緣文或文義俱時而照不同八地已上常恆無間文義俱照而已四重出體凡論出體總有四重一攝相歸性體即一切法皆性真如故大波若經理趣分一切有情皆如來藏勝鬘經夫生者是如來藏無垢稱言一切衆生皆如也衆賢聖亦如也至於彌勒亦如也諸經論如是非一二攝境從識體即一切法皆是唯識華嚴等三界唯心如是等文證非一三攝假隨實體即諸假法隨何所依實法為體如瓶等以四塵為體諸不相應是色心分位是也此類非一四性用別論體色心假實各別處收如瑜伽色蘊攝彼十處界是也此類衆多又有四重一真如二無相三唯識四因緣此二四體攝法義周隨其所應釋一切法也故不故思審慮思决定思動發勝思謂之三種思前二種思是發身語遠近加行此與意俱故作動意故名曰意業第三勝思正身語是其身語二業體也如是造業謂之故思業除此已外不覺誤犯謂之不故思業瑜伽第九十卷云故思所造業者謂先思量已隨尋思已隨伺察已而有所作彼或錯亂或不錯亂其錯亂者謂於餘處思欲殺害或欲劫盜或欲別離或欲妄語及欺誑等如是思已即以此想別處成辦不錯亂者當知其相與此相違矣增不增業起造諸業而令習氣增益謂之增長業設有故思不起身語等及雖起身語而不令種增長謂之不增長業瑜伽第九云增長業者謂除十種一夢所作二無知所作三無故思所作四不利不數所作五狂亂所作六失念所作七非樂欲所作八自性無記九悔所損十對治所損除此十種名增長業不增長業謂此十種又八十九云諸作不增長業若無追悔不修對治尚可受果名增長業若追悔等名不增長業或先增長業由追悔等名不增長業如未生未追悔前名增長業追悔已後名不增長業矣定不定業瑜伽論第九十云定受業者謂故思所造重業不定受業者謂故思所造輕業由三因緣令業成重一由意樂故二由加行故三由田故由意樂者謂由猛利纏等所作於同法者見已歡喜於彼隨法多隨尋思多隨伺察如是名為由意樂故令業成重曰加行者謂於彼業無間所作殷重所作長時積集又於其中勸他令作又即於彼稱揚讚歎如是為由加行故令業成重由田故者謂諸有情於己有恩若住正行及正行果於彼起善作𢙣作當知此業名為重與彼相違名為輕又第六十云依末解者建立定受業矣謂世道伏斷乃至得聖得無學等名為解者與此相違者名為未解者也三業四業阿毗達磨集論四云業差別有三種謂順現法受業順生受業順後受業順現法受業者若業於現法中異熟成熟謂從慈定起已於彼造作若損若益必得現異熟如從慈定起從無諍定起從定起從預流果起從阿羅漢果起亦爾又於佛為上首僧中造善惡業必得現異熟又有餘猛利意樂方便所行善不善業亦得現異熟順生受業者若業於無間生中異熟成熟謂五無間業復有所餘善不善業於無間生異熟成熟者一切皆名順生受業順後受業者若業於無間生後異熟成熟是名順後受業雜集論八云於此業中從初熟位建立順現法受等名不唯受此一位異熟若業於此生造即從此生已去異熟成熟名順現法受業若業於此生造從無間生已去異熟成熟名順生受業若業於此生造度無間生已去異熟成熟名順後受業矣問何名無諍定答雜集論七云無諍者謂依止靜慮於防護他所應起煩惱住具足中若定若慧及彼相應諸心心所矣唯識論中更加順不定受業以為四業也定不四業瑜伽六十云復有四業一異熟定二時分定三二俱定四二俱不定矣了義燈五云餘三不定第一約報受雖是定然時不定第二時定而報不定故並不定决定三業阿鼻達磨集論四云云何名為决定受業謂作業决定受異熟决定分位决定雜集論七云作業决定者由宿業力感得决定異熟相續於此生中必造此業何以故應造此業期限决定故終不越限必造此業乃至諸佛世尊大神通力亦不能為障令其不造隨因决定力果相續轉變故受異熟决定者如先所故思造業分位决定業者如由此業於現報中必定受異熟由此業必受生異熟由此業必受後異熟法華玄贊十云若業道攝名順定業加行後起通定不定又未悔未對治等名决定業已悔已對治等名不定業五種故思阿毗達磨集論四云云何名為故思造業謂他所教勑故思造業他所勸請故思造業無所了知故思造業根本執著故思造業顛倒分別故思造業雜集論七云他所教勑故思造業者猶如有一雖不欲樂因他強力之所教勑起故思行不善業他所勸請故思造業者猶如有一雖不欲樂因他勸請因他引導執為利益起故思行不善業無所了知故思造業者猶如有一不了得失無所執著隨欲造業者所作發起故思行不善業根本執著故思造業者猶如有一為貪瞋等不善根纏故其心猛亂執著起故思行不善業顛倒分別故思造業者猶如有一依不平等內見愛樂邪法為求當來可愛異熟起故思行不善業前三故思作業雖作不增長輕故不必受異熟後二故思作業若作若增長重故必定受異熟矣福等三業一福業謂感欲界善趣異熟及順五趣受之善業是也前是人天總業後是五趣別業也福者勝義其相殊勝自體及果俱可愛樂故名為福二非福業謂感惡趣異熟及順五趣異熟之不善業是也初是三𢙣趣總業後是五趣別業也非福者劣義其相鄙劣自體及果俱不可樂故名非福三不動業謂感色無色界異熟及順色無色受之業是也前是總業後是別業也此業以定所攝定於自處受其果報不如欲界散業遇緣而轉得餘趣處受報故名不動或定地攝名為不動以定能住於一境也略述法相義卷下標目四十一位十住位次十行位次十向位次十地位次妙覺果滿入等三心四加行位真相見道資等五位三大僧祇十波羅密三波羅密功無功用遍等三性三性觀行伏斷次敘故意𭤧行永滅不行頓漸二悟智增悲增二種生二生位鏡智心品平等心品察智心品成智心品妙平初起鏡事初起初地所斷二地所斷三地所斷四地所斷五地所斷六地所斷七地所斷八地所斷九地所斷十地所斷金剛所斷極所乘十種真如依詮廢詮變化身土長時暫變自受用土他受用土有邊無邊自性身土摩醯首羅三身成道三種常住淨八識聚五重唯識
