body:
  text: 四十一位菩薩行位有其四十一謂十住十行十迴向十地妙覺也十住位次一發心住二治地住三修行住四生貴住五方便住六正心住七不退住八童真住九法王子住十灌頂住謂之十住第一心住謂菩薩創首於大菩提心名心住於此位中而修十信謂一信心二精進心三念心四惠心五定心六施心七戒心八護心九願心十迴向心雖精進等九心各異以信為主俱時信之所助故名十信也第二治地住謂淨治三業悲及有識名治地住第三修行住謂修勝理觀起上妙行名修行住第四生貴住謂從諸聖法正教中生名生貴住第五方便住謂所修善根皆為救物名方便具足住第六正心住謂所聞讚毀心定不動名正心住第七不退住謂聞三寶三際有無心堅不轉名不退住第八童真住謂三業清潔悟二世間真簡偽虛童表無垢故名童真住第九法王子住謂解真俗諦悟法王法將有所襲名法王子住第十灌頂住謂如太子之堪受王位行漸勝故名灌頂住何故通名住耶菩薩在此創安其心於六度等行未殊勝但得住名十行位次一歡喜行二饒益行三無恚行四無盡行五離癡乱行六善現行七無著行八尊重行九善法行十真實行謂之十行第一歡喜行謂為大𭤸主一切能捨三時無悔利譽不悕愍生慕法睹者歡敬名歡喜行第二饒益行謂常持淨戒不染五欲令伏眾魔一切眾生立無上戒得不退地名饒益行第三無恚行謂常修忍辱謙𤰞恭敬和顏愛語不害自他悟身空寂對能忍名無恚行第四無盡行謂假設多劫受諸劇苦求法濟生念念不息名無盡行第五離癡乱行謂常住正念恒無散乱於一切法乃至生入胎出胎無有癡乱名無癡乱行第六善現行謂善入法皆無性相三業寂滅無縛無著而復不捨化眾生心巧能隨類現生救物名善現行第七無著行謂歷諸塵剎供佛求法傳燈度生心無猒足然以寂滅觀諸法故而於一切心無所著名無着行第八尊重行謂尊重善根智惠等法皆悉成就而由得斯諸尊重法二利之行更增修習名尊重行第九善法行謂得四無㝵𨹔羅尼門諸善惠法能為眾生作清凉池善守護正法佛種不絕名善法行第十真實行謂成就第一義諦之悟學三世佛真實之語無二之語如能行如行能語行相應色心皆順名真實行矣何故通名行謂行六度等諸行勝故名之為行十向位次一救護眾生離眾生相迴向二不壞迴向三等諸佛迴向四至一切處迴向五無盡功德藏迴向六隨順一切堅固善根迴向七等心隨順一切眾生迴向八如相迴向九無著無解心迴向十法界無量迴向謂之十迴向第一救護眾生離眾生相迴向謂行六度四攝法等悉為救攝一切有情令離生得涅槃樂名救護眾生入平等觀不見親眾生等相名離生相第二不壞迴向謂於三寳所得不壞信因持諸善迴向眾生令獲善利名不壞迴向第三等諸佛迴向謂學三世佛不著生不離菩提修迴向事名等諸佛迴向第四至一切處迴向謂修習一切諸善根時以彼善根如是迴向令此善根功德之力至於一切三寳之所一切世界眾生之所作諸供養利益之事譬如實際無處不有名一切處迴向第五無盡功德藏迴向謂修悔過善根離一切業於諸如來一切眾生所有善根皆悉隨喜以此善根皆悉迴向莊嚴一切諸佛淨剎常作佛事善巧方便具諸功德離諸虛妄而無所著由迴向已得無盡善根名無盡藏功德迴向第六隨順一切堅固善根迴向謂以內外財隨眾生意而惠之見諸苦者悲以身代堅固安住自性㓛德以如是等諸善㓛德而迴向已令一切生得大智惠除滅大苦名隨順一切堅固善根迴向第七等心隨順一切眾生迴向謂能增長一切善根修習究竟安住忍力閇𢙣趣門永離顛倒不著諸行一切善根由皆悉迴向為一切眾生作功德藏普覆一切出生令得眾善等無差異名等心隨順一切眾生迴向第八如相迴向謂成就念智安住不動心無所依寂然無乱不違一切平等正法嚴剎度生所修諸善皆順如相而為迴向名如相迴向第九無著無解迴向謂所攝善根離憍慢等所有著得解心行普賢行所習諸善不執為己及以他人以無縛著解之心迴向饒益品物一切故名無著無解心迴向第十法界無量迴向謂離垢繒繫頂受大法師記法施他生嚴淨世間出生智等悉同虚空而無限量凢有善根修於迴向悉等法界故名法界無盡迴向矣何故通名迴向在斯位已凢所修行皆為迴向立迴向名十地位次一極喜地二離垢地三光地四熖惠地五極難勝地六現前地七遠行地八不動地九善惠地十法雲地謂之十地第一極喜地初獲聖性具證二空能益自他生大喜故第二離垢地具淨尸羅遠離能起微細毀犯煩𢙉垢故第三光地成就勝定大法摠持能發無邊妙惠光故第四熖惠地安住㝡勝菩提分法燒煩惱薪惠熖增故第五極難勝地真俗兩智行相互違合令相應極難勝故第六現前地住緣起智引無分別㝡勝般若令現前故第七遠行地至無相住功用後邊出過世間二乗道故第八不動地無分別智任運相續相用煩惱不能動故第九善惠地成就微妙四無礙解能遍十方善法故第十法雲地大法智雲含眾德水蔽如空麁重充滿法身故矣何故通名地耶如是十地摠攝有為無為功德以為自性與所修行為勝依持令得生長故名為地能證所證以為地躰即通真如正智皆能生長真如何名令得生長今者不言如為能生但言行是所生彼為增上緣行自從種子生故妙覺果滿頌曰此即無漏界不思議善常安樂解身大牟尼名法此謂二轉依果由轉煩惱得大涅槃轉所知證無上覺謂之二轉依果即是究竟無漏界攝諸漏永盡非漏隨增性淨圓明故名無漏界是藏義此中含容無邊希有大功德故或是因義能生五乘世出世間利樂事故微妙甚深超過尋思言議道故言不思議清淨法界遠離生滅極安穩故四智心品妙用無方極巧便故並順益相而違不善故為善清淨法界無生無滅性無變易故為常四智心品所依常故無斷盡故亦為常清淨法界眾相寂靜故名安樂四智心品永離惱害故名安樂此二自性皆無逼惱及能安樂一切有情二乗所得二轉依果唯永遠離煩惱無殊勝法故但名解身大覺世尊成就無上寂默法故名大牟尼無量無邊力無畏等大㓛德法所莊嚴故亦名法身躰依聚義摠名身如是法身有三相別一自性身二受用身三變化身一自性身謂諸如來真淨法界受用變化平等所依離相寂然絕諸戱論具無邊際真常㓛德是一切法平等實性亦名法身大㓛德法所依止故二受用身此有二種一自受用謂諸如來三無數劫脩集無量福慧資糧所起無邊真實㓛德及極圓淨常遍色身相續湛然盡未來際恒自受用廣大法樂二他受用謂諸如來由平等智示現微妙淨㓛德身居純淨土為住十地諸菩薩眾現大神通轉正法輪決眾疑網令彼受用大乗法樂合此二種名受用身三變化身謂諸如來由成事智變現無量隨類化身居淨穢土為未登地諸菩薩眾二乗異生稱彼機冝現通法令各獲得諸利樂事也入等三心十地各有入住出心入地未久謂之入心久住時分謂之住心久住之後漸近後位謂之出心三心各經多俱胝百千大劫也似如十地各有三心地前諸位亦當得有入住出心也四加行位第十迴向滿心之位修四加行謂燸頂忍世第一法此位菩薩修四尋思四如實觀四尋思者尋思名義自性差別假有實無如實遍知此四離識及識非有名如實智名者謂色受等亦攝名因名果等尋思名因者謂字字身多字身及聲等名果者句及名身多名身多句身等皆名之果名召法勝但尋名義者如名身等所詮表得蘊處界等若躰若義摠名為義以義寬故不自體自性謂體也差別謂體上差別也名義各有自性差別名義相異故別尋思二二相同故合尋思矣依明得定發下尋思觀無所取立為燸位謂此位中創觀所取名等四法皆自心變假設有實不可得初獲惠日前行相故立明得名即此所獲道火前相故亦名燸依明增定發上尋思觀無所取立為頂位謂此位中重觀所取名等四法皆自心變假設有實不可得明相轉盛故名明增尋思位極故復名頂依印順定下如實智於無所取決定印持無能取中亦順樂忍既無實境離能取識寧有實識離所取境所取能取相待立故印順忍時摠立為忍印前順後立印順名忍境識空故亦名忍下忍起時印境空相中忍轉位於能取識如境是空順樂印可上忍起位印能取空依無間定上如實智印二取空立世第一法謂前上忍印能取空今世第一法二空雙印從此無間必入見道故立無間名異生法中此㝡勝故名世第一法真相見道見道者唯在初地入心加行無間此智生時體會真如以初照理名曰見道無漏正智照理名見行人遊履而趣極果名之曰道見即是道然此見道畧有二一真見道二相見道初真見道亦云一心真見道謂若時菩薩於所緣境無分別智都無所得不取種種戱論相故尒時乃名實住唯識真勝義性即證真如智與真如平等平等俱離能取所取相故此緣真智狹𭘧真如之體相起故名所緣非𭘧彼相分而起名緣雖無相分而可此𭘧如相起不離如故雖有見分而無分別非能取非取全無實證二空所顯真理實斷二分別隨眠雖多剎那事方究竟而相等故摠一心多剎那者無間解二道也謂合三界分別煩惱以為一品又合三界分別所知以為一品合此二而一念斷以生空智斷煩惱以法空智斷所知斷惑一念名無間道證理一念名解道問斷證之位當是俱時如彼明來闇去之時何有二道耶答此有二因一雖無間道已無惑種證彼無為由加行期心別故謂無間道能斷惑解道能證滅有此用別起解道二無間道時雖無惑種而未捨彼無堪任性為捨此故起解道次相見道者真見道後方得生起前真見道證唯識性後相見道證唯識相前真見道根本智攝後相見道後得智攝此智二分俱有思惟似真如相不見真實真如性故此復有二一觀非安立諦二緣安立諦初觀非安立諦者此有三品心一內遣有情假緣智能除耎品分別隨眠二內遣諸法假緣智能除中品分別隨眠三遍遣一切有情諸法假緣智能除一切分別隨眠何故得有如是三心謂人法二各分上下麁者為上細者為下合為四類然二麁者各別除之以智猶弱未雙斷故若上品智方能雙斷然初二智未能殊勝但緣內身除我法假第三心時其智上品能廣緣一切內外我法故三別也內遣者唯緣內身而遣假故有情假者先解有情皆妄所計但有內心似有情現談其無躰名之為假緣智者能緣心即緣內身為境遣有情假之緣智也下皆准知初起名耎次智名中勝前劣故後起名上於斷見惑此智㝡上故以惑從智三品也問真見道時已實斷證何得重有如是斷證耶答今此斷證非實斷證但以假相法則彼真也如何法則謂真見道有二空見分二空見分各有無間解二道有四見分無間道中人法見分各別法故有初二心解道中人法二見摠法有第三心無間所斷有差別故各別法則解所證唯一味故摠而法則次緣安立諦有十六心此復有二一者依觀所取能取別立法類十六種心二者依觀下上諦境別立法類十六種心初十六心者謂於苦諦有四種心一苦法智忍謂觀三界苦諦真如正斷三界見苦所斷二十八種分別隨眠何故名曰苦法智忍苦者苦諦法者苦諦教智者加行道中緣苦法之智忍者無漏忍忍前苦法智是故名曰苦法智忍二苦法智謂忍無間觀前真如證前所斷煩惱解法謂苦如能緣苦如之智名苦法智三苦類智忍謂智無間無漏惠生緣苦法忍以後聖法是此苦智之類名為苦類苦智有之稱於苦智名苦類智緣此之惠名苦類智忍四苦類智謂此無間無漏智生緣苦法智審定印可苦類智忍緣苦類之智名苦類智决斷言智惠即不尒忍智無別隨用標名如於苦諦有四種心集滅道諦應知亦尒此十六心八觀真如八觀正智法真見道無間解見自證分差別建立名相見道所取謂諦理能取謂緣理之智法忍法智緣諦理為境觀所取也類忍類智證前智品觀能取也法忍法真無間道見分法智法真解道見分類忍法無間道之自證分𩔗智法解道之自證分印前智故差別立也次十六心者謂觀現前不現前界苦等四諦各有二心一現觀忍二現觀智如其所應法真見道無間解見分觀諦斷見所斷百一十二分別隨眠名相見道欲界名現前界現於欲界入見道故上二界名不現前現觀忍法真見道無間道見分現觀智法真見道解道見分欲界四諦四十上界各三十六諦各除瞋故一百一十二也資等五位五位謂一資糧位二加行位三通達位四修習位五究竟位也十住十行十迴向謂之資糧位為趣無上正等菩提修集種種勝資糧故煗法頂法忍法世第一法名加行位加功而行故曰加行近見道故立加行名非前資糧無加行義真相見道名通達位加行無間此智生時體會真如名通達位出相見道已住出地心乃至第十地終金剛無間道來並名修道為斷餘證得轉依復數修習無分別智故名修習位二轉妙果名究竟位即是究竟無漏界故三大僧一切菩薩因位修行必經三大阿僧劫阿僧此云無數斯乃超過一切筭數故曰無數非全無限瓔珞經下云言一切菩薩行道劫數久近者譬如一里二里乃至十里石方廣亦然以天衣重三銖人中日月歲數三歲一拂此石乃盡名一小劫若一里二里乃至四十里亦名小劫又八十里石方廣亦然以梵天衣重三銖即梵天中百寶光明珠為日月歲數三歲一拂此石乃盡名一中劫又八百里石方廣亦然以淨居天衣重三銖即淨居天千寶光明鏡為日月歲數三歲一拂此石乃盡故名一大阿僧祇劫矣資糧加行經初僧祇自極喜地至第七地經第二劫従第八地至第十地經第三劫三時量未必齊等但約修行淺深不同以建立之劫石等喻且顯長遠非云齊等不同行相種種差別其旨如下十波羅蜜十波羅蜜者菩薩所修之行也一布波羅蜜有三種謂財無畏法財名財他不令犲狼等畏名無畏為他法名法財益他身法資益善根無畏資他心二戒波羅蜜戒有三種謂律儀戒攝善法戒饒益有情戒轉捨不善謂之律儀律謂法律儀謂儀式也轉生善法謂之攝善轉生利生謂之饒益三忍辱波羅蜜忍有三種謂耐害忍安受苦忍諦察法忍雖遇敵害愍彼不捨謂之耐害忍雖遇寒𭵴等苦更無退轉謂之安受苦忍真如理躰是無生法證彼之智謂之諦察法忍亦名無生法忍也四精進波羅蜜精進有三種謂被甲精進攝善精進利樂精進發猛利樂欲名被甲如著鉀入陣即無所畏有大威勢餘二可知五靜慮波羅蜜靜慮有三種謂安住靜慮引靜慮辨事靜慮安住現法樂住故名安住引六通故名引辨利生事能令止息飢儉等苦故名辨事六般若波羅蜜般若翻惠此有三種謂生空無分別惠法空無分別惠俱空無分別惠簡異後得言無分別七方便波羅蜜方便善巧有二種謂迴向方便善巧濟方便善巧此由般若及與大悲以諸善根迴求無上菩提是般若作諸有情一切善利是大悲八願波羅蜜願有二種謂求菩提願利樂他願九力波羅蜜力有二種謂思擇力修習力以由思擇修習二力令前六度無間現行思擇諸法而修習故十智波羅蜜智有二種謂受用法樂智成就有情智由等六成立此智復由此智成立六種名受法樂由此妙智能正了知此戒等饒益有情名成有情波羅蜜多此云到彼岸到涅槃故三波羅蜜十波羅蜜有三種名一名波羅蜜多謂初無數劫尒時等勢力尚微被煩惱伏未能伏彼由斯煩惱不覺現行純是有漏去無相遠𭘧相修習由此但名波羅蜜多二名近波羅蜜多謂第二無數劫尒時等勢力漸增非煩惱伏而能伏彼由斯煩惱故意方行是通無漏隣無相故或近無加行故名曰近三名大波羅蜜多謂第三無數劫尒時等轉增能畢竟伏一切煩惱由斯煩惱永不現行是純無相任運長時故名為大初地已前一行中修一行謂以當位行為首兼修餘一行初地已去一行中修一切行謂以當地行為首修諸八地已去一切行中修一切行謂非唯以當地行為首亦以等為首修餘也所謂當地所修行者初地修檀乃至十地修智度也㓛無㓛用七地已前謂有㓛用八地已上謂無㓛用若對佛果八地已上尚有㓛用謂二乘聖者十地菩薩於能治藥所治之病俱不能遍了知盡故於後得智中為他法必須假藉尋伺二法與佛稍別佛無㓛用而法故八地已去雖無㓛用果未滿故尚有任運㓛用也又㓛用有二一自利二利他前八地已去皆無後八地已上猶有七地已前二用並有八地已去無㓛用者無自利用任運入地非於利他亦無㓛用佛二俱無故法時不假㓛用有正思惟躰即是思不名為尋遍等三性一遍計所執性謂由彼彼虛妄分別遍計種種所遍計物謂所妄執蘊處界等若法若我自性差別此所妄執自性差別摠名遍計所執自性如是自性都無所有理教推徵不可得故謂之遍計所執周遍計度故名遍計二依他起性謂眾緣所生心心所體及相見分有漏無漏皆依他起依他眾緣而得起故名依他起三圓成實性謂二空所顯圓滿成就諸法實性名圓成實顯此遍常體非虛謬簡自共相虚空我等體遍即圓滿也是簡自相諸法自相局法體故不通於餘若通於餘便非自相故唯真如能遍諸法體常即成就也是簡共相諸法無常空無我等雖遍諸法體非實有非有實體貫通諸法唯有觀心無共相體既尒不應彼體性是常法體非虚謬即諸法實性是簡虛空我等小乗外道執虚空我亦體是常能遍諸法彼虛謬非法實性非虛之言簡異虛空非謬之言即簡我等等妄執故具此三義名圓成實無漏有為亦得稱為圓成實性亦具三義一者離倒體非染故是其實義二者究竟諸有漏法加行善等以非究竟不能斷惑諸無漏法以究竟故能斷諸染是其成義三者勝用周遍謂能普斷一切染法普緣諸境緣遍真如是其圓義故淨依他亦是此性也三性觀行一切愚夫迷執於境起煩惱業生沉淪不解觀心勤求出離哀愍彼故唯識言令自觀心解生唯謂簡別無外境識謂能了詮有內心識體即唯持業釋也識性識相皆不離心心所心王以識為主歸心泯相摠言唯識唯境有執有者喪其真識蕳心空滯空者乖其實所以晦斯空有長溺二邊悟彼有空高履中道以所觀境通三自性是故名曰唯識三性觀也菩提薩埵雖行願多專以此觀而為本行為成此觀兼修餘行伏斷次敘煩惱所知分別現行資糧位漸伏加行位頓伏少分伏名漸伏猶有餘故全分伏名頓伏更無餘故資糧位伏其麁者加行位伏其細者因邪師教所起名麁由自分別所起名細分別二種子習氣俱初地斷謂無間道斷種解道斷習也煩惱中修所斷種金剛喻定現在前時一切頓斷彼現起地前漸伏初地已上能頓伏盡令永不行如阿羅漢由故意力前七地中雖暫現起而不為失有不怖者故起煩惱怖者不然八地已上畢竟不行道力勝故所知中修所斷種於十地中漸次斷金剛喻定現在前時方永斷盡彼現起地前漸伏乃至十地方永伏盡八地已上六識俱者不復現行無漏觀心及果相續能違彼故第七俱者猶可現行法空智果起位方伏若俱生煩惱習氣於十地間地地除之問體上氣分謂之習氣如納香篋雖取其香餘香猶在何故猶有種子體在習氣先耶答種體先滅氣分後如納香篋餘香猶在有種子體習氣先如香先麝香體有何必一槩耶故意方行俱生煩惱之現起地前漸伏初地已上能頓伏盡令永不行如阿羅漢由故意力前七地中雖暫現起而不為失何故故起為利有情也如何故起謂若有人將害千人菩薩以愍多人殺彼一人故起嗔恚而犯殺業生地獄中代有情苦或依大悲相應智力助於人天古業故起貪愛潤人天生受隨類身濟度眾生也永滅不行八地已上能畢竟伏一切煩惱由斯煩惱永不現行謂第六識生空無漏相續無間也何故不故起耶謂故起煩惱本擬潤生八地以去無分𫨻無由可藉煩惱助潤若尒何故不斷種子謂惑種在變易時長不假數資若無惑種變易時促如二乘無學願數數資又十地練根偏求菩提是故不假斷煩惱種煩惱雖在不得地是故不斷也煩惱不能助潤變易謂惑種在變易時長者何也謂雖非親助潤變易如分𫨻生遠勢亦有故令變易其時長也頓漸二悟於菩薩乘分為二類謂頓悟漸悟也頓悟者無始以來唯有菩薩無漏種子其性頓大不經二乗直入菩薩故名頓悟亦名直往漸悟者無始以來並具三乗無漏種子是故先經二乗行果然後迴心入菩薩行既非直入故名漸悟此漸悟人迴心之後稍經劫數而入資糧僧時分謂初果迴心者經八萬劫二果迴心者經六劫三果迴心者經四万劫四果迴心者經二萬劫獨覺迴心者經十千劫智增悲增智惠增上謂之智增菩薩大悲增上謂之悲增菩薩頓悟漸悟各有此二類於漸悟中從不還阿羅漢而迴心者必是智增也從預流一來而迴心者或成智增或成悲增初二果人有欲惑故或成悲增本性下劣恐生故或成智增二種生生有二一分段生謂諸有漏善不善業由煩惱緣助勢力所感三界麁異𤎼果身命短長隨因緣力有定齊限故名分段取名言熏習識等五種而為親因福及非福不動三業為勝增上能招感緣一切煩惱摠能為業潤生之緣由斯分段異𤎼得生二不思議變易生謂諸無漏有分別業由所知緣助勢力所感殊勝細異𤎼果由悲願力改轉身命無定齊限故名變易無漏定願正所資感妙用難測名不思議有分別業即後得緣事智俱之思思亦即願故不別由所知執彼菩提有情為有而起悲願即以識等五果種子而為親因緣欲界福業并色不動除無想天及五淨居為近勝緣依四靜慮緣事無漏後得悲智相應定願而為遠勝緣雖實變易用名言種而為親因福不動業為增上緣若無無漏無勝堪能感變易生由所知方悲願故起無漏資身故業今隱所資但舉能資及以能發勝劣兩緣明變易生體是有漏無漏界外生者依勝緣馬二種生正取異𤎼第八為體兼通餘識異𤎼五蘊也二生位或有菩薩初地即能伏諸煩惱故初地得變易生或有乃至八地方得謂有唯受分叚非變易謂諸凢夫四果定性或唯受變易非分𫨻謂二乗無學不定性者八地已上菩薩或亦受分段亦受變易謂前三果不定性七地已前以由自在受變易煩惱未盡受分𫨻有起煩惱謂悲增上者有不起煩惱謂智增上者或雖悲智等而所樂行不同一怖故伏惑𢙢為失一不怖故起利生故或伏或不伏有此差別也鏡智心品大圓鏡智相應心品謂此心品離諸分別所緣行相微細難知不忘不愚一切境相性相清淨離諸雜染純淨圓德現種依持能現能生身土智影無間無斷窮未來際如大圓鏡現眾色像不愚者不迷闇義由此如來名一切種智及一切智不忘者恒現前義由此如來成不忘失法純者無雜淨者離染圓者滿義純簡因無漏淨簡一切有漏圓簡二乗無學㓛德現行㓛德之依種子㓛德之持矣何故名大圓鏡智耶謂依佛智鏡諸處境識眾像影現平等平等故以為喻圓鏡即智持業釋相應心品言通相應法此品緣一切法緣真如故是無分別緣餘境故後得智攝其體是一隨用分二了俗由證真故為後得餘一分二准此應知此轉有漏第八識相應品而得矣平等心品平等性智相應心品謂此心品觀一切法自他有情悉皆平等大慈悲等恒共相應隨諸有情所樂示現受用身土影像差別妙觀察智不共所依無住涅槃之所建立一味相續窮未來際隨諸有情所樂示現者隨十地菩薩所宜現也遍緣真俗為境二智所攝焉何故名為平等性智謂平等性真如理也智緣於此故言平等此在因中有我執故自他差別今我無故自他平等也此轉有漏第七識相應品而得矣察智心品妙觀察智相應心品謂此心品善觀諸法自相共相無礙而轉攝觀無量摠持定門及所生㓛德珍寶於大眾會能現無邊作用差別皆得自在雨大法雨斷一切疑令諸有情皆獲利樂攝觀無量摠持定門者雖餘二智非無此德此智勝能攝蔵故名為攝示常觀察此摠持定門故名為觀㓛德珍寶者謂六度道品十力等法作用差別謂現通等神用莫方稱之為妙具緣諸法自共相等名為觀察籌量境相妙用勝故也緣一切法自相共相皆無礙二智所攝此轉有漏第六識相應品而得矣成智心品成所作智相應心品謂此心品為欲利樂諸有情故普於十方示現種種變化三業成本願力所應作事所作之成成所作即智故名成所作智此品亦能遍緣三世諸法隨意樂力或緣一法或二法或多隨作意生緣事相境起化業故後得智攝此轉有漏前五識相應品而得矣妙平初起平等性智相應心品菩薩見道初現前位違二執故方得初起妙觀察智相應心品生空觀品二乗見位亦得初起法空觀品菩薩見位方得初起菩薩見道頓斷二是故二智起必同時若能觀智識因唯第六通真俗三智餘不能起行摠緣觀理趣入真故第七由他引亦為此觀通中後智有漏第七唯緣第八見分不能廣緣諸法無廣行故不成能對治道第六斷惑成妙觀察智第七所引亦證無漏成平等性智故云他引成能觀七地以前以漏無漏間雜而起第六若有漏則第七亦有漏若第六入法空妙觀第七亦法空平等性智若第六入生空妙觀第七猶起法執也鏡事初起大圓鏡智相應心品成所作智相應心品佛果初起異𤍨識種金剛喻定現在前時猶未頓捨與無間道不相違故非有漏劣無漏法但與佛果定相違故金剛喻定無所熏識無漏不增應成佛故由斯此品從初成佛盡未來際相續不斷持無漏種令不失故非有漏謂有漏善三無記法全異𤍨生少分除法執一分故劣無漏法謂即十地中所生現行及此種類中下品種也因位第八是有漏故所變五根亦是有漏有漏根何發無漏識此二於境明昧異故問無漏第七以有漏第八為所依豈非無漏識依有漏根耶答彼根共依此不共依問如初無漏以有漏心為等無間緣等是非不共依耶答彼非俱有此俱有依問生空無漏第六識以有漏第七為所依是非不共俱有依耶答彼非同境此同境根也由斯此品佛果初起矣初地所斷初地所斷異生性鄣謂二鄣中分別起者依彼種立異生性故謂於聖法不得假設之異生性者或五四蘊成有情法性唯染污異生之性名異生性異生有二義一別異名異謂聖唯生人天趣此通五趣故生謂生類異於聖人之生類名為異生二變異名異凢類轉變為邪見等有於變異之生類名為異生雖見道生亦斷𢙣趣諸業果等而今且能起煩惱是根本故由斯解深密四及瑜伽七十八斷二愚及彼麁重一執著我法愚即是此中異生性鄣二𢙣趣雜染愚即是𢙣趣諸業果及善趣中分別所起別報業果等此愚品故摠為愚諸業果等雖體非愚業是愚所起果是業所感後准此釋或彼唯利鈍鄣品俱起二愚彼麁重言顯彼二種或二所起無堪任性後麁重言例此應釋理實初地脩道位中亦斷俱生所知一分然今且㝡初斷者後九地斷准此應知住滿地中時既淹乆理應進斷所應斷不尒三時道應無別二地所斷二地所斷即邪行謂所知中俱生一分及彼所起悞犯三業彼二地極淨尸羅入二地時便能永斷由斯瑜伽七十八斷二愚及彼麁重一微細悞犯愚即是此中俱生一分二種種業趣愚即彼所起悞犯三業或唯起業不了業愚也於諸有情身等邪行故名邪行能第二地淨尸羅故名趣毀責為名如稱人言𢙣趣不可言能取趣名趣不取𢙣果故悞犯三業名愚者愚品故若業招生死所知不能非法故若智三業不招𢙣果此亦能三地所斷三地所斷即闇鈍鄣謂所知中俱生一分令所聞思修法忘失彼鄣三地勝定摠持及彼所殊勝三慧入三地時便能永斷由斯瑜伽斷二愚及彼麁重一欲貪愚即是此中能勝定及修惠者由於五欲起貪多住散亂於定及修惠修惠與定相近故唯非不亦思惠等彼昔多與欲貪俱故名欲貪愚今得勝定及修所成彼既永斷欲貪隨伏此無始來依彼轉故二圓滿聞持𨹔羅尼愚即是此中能鄣摠持聞思惠者以聞思與聞持相近故偏之非不修惠然從勝故別分二非一體義二四地所斷四地所斷即微細煩惱現行謂所知中俱生一分第六識俱身見我所邊見及我慢我愛與見俱者并彼定愛法愛等㝡下品故不作意緣故遠隨現行故名微細分別身見等法其相麁猛謂之上品第六識中獨頭等通不善性謂之中品今所斷惑行相㝡細而唯無記故名㝡下非如見斷強思等生故曰不作意緣無始以來隨逐於身不捨於身故曰遠隨現行彼四地菩提分法入四地時便能永斷彼昔多與第六識中任運而生執我見等同體起故煩惱名今四地中既得無漏菩提分法彼便永此我見等亦永不行彼定法愛三地尚增入四地時方能永斷菩提分法特違彼故由斯瑜伽斷二愚及彼麁重一等至愛愚即是此中定愛俱者二法愛愚即是此中法愛俱者所知鄣攝二愚斷故煩惱二愛亦永不行問何故身見等菩提分法耶答菩提分法修念住等由執我故彼念住觀法無我等故為五地所斷五地所斷即於下乗般涅槃謂所知中俱生一分令猒生樂趣涅槃同下二乗猒苦欣滅彼五地無差別道入五地時便能永斷由斯瑜伽斷二愚及彼麁重一純作意背生愚即是此中猒生者二純作意向涅槃愚即是此中樂涅槃者也六地所斷六地所斷即麁相現行謂所知中俱生一分執有染淨麁相現行彼鄣六地無染淨道入六地時便能永斷由斯瑜伽斷二愚及彼麁重一現觀察行流轉愚即是此中執有染者諸行流轉染分攝故二相多現行愚即是此中執有淨者取淨相故相觀多行未能多時住無相觀七地所斷七地所斷即細相現行謂所知中俱生一分執有生細相現行彼七地妙無相道入七地時便能永斷由斯瑜伽斷二愚及彼麁重一細相現行愚即是此中執有生者猶取流轉細生相故執有生者以行流轉以生為首實皆有且擧一生非不執即執流轉相也二純作意求無相愚即是此中執有者尚取還滅相故純於無相作意勤求未能空中起有勝行八地所斷八地所斷即無相中作加行鄣謂所知鄣中俱生一分令無相觀不任運起前之五地有相觀多無相觀少於第六地有相觀少無相觀多第七地中純無相觀雖恒相續而有加行由無相中有加行故未能任運現相及土如是加行鄣八地中無㓛用道故若得入第八地時便能永斷彼永斷故得二自在由斯瑜伽斷二愚及彼麁重一於無相作㓛用愚二於相自在愚令於相中不自在故此亦攝土相一分故八地以上純無漏道任運起故三界煩惱永不現行第七識中細所知鄣猶可現起生空智果不違彼故九地所斷九地所斷即利他中不欲行鄣謂所知鄣中俱生一分令於利樂有情事中不欲勤行樂脩己利彼鄣九地四無礙解入九地時便能永斷由斯瑜伽斷二愚及彼麁重一於無量所法無量名句字後後慧辨𨹔羅尼自在愚於無量所法𨹔羅尼自在者謂義無礙解即於所詮摠持自在於一義中現一切義故於無量名句字𨹔羅尼自在者謂法無礙解即於能詮摠持自在於一名句字中現一切名句字故於後後慧辨陀羅尼自在者謂詞無礙解即於言音展轉訓釋摠持自在於一音聲中現一切音聲故二辨才自在愚辨才自在者謂辨無礙解善達機冝巧為故愚能此四種自在皆是此中第九鄣攝十地所斷十地所斷即於諸法中未得自在鄣謂所知中俱生一分令於諸法不得自在彼鄣十地大法智雲及所含蔵所起事業入十地時便能永斷由斯瑜伽斷二愚及彼麁重一大神通愚即是此中鄣所起事業者二悟入微細秘密愚即是此中鄣大法智雲及所含蔵者也金剛所斷十地於法雖得自在而有餘鄣未名㝡極謂有俱生微所知及有任運煩惱鄣種金剛喻定現在前時彼皆頓斷入如來地由斯瑜伽斷二愚及彼麁重一於一切所知境𭫸微細著愚即是此中微所知鄣二極微細礙愚即是此中一切任運煩惱鄣種也𭫸所棄所餘有漏法種劣無漏金剛喻定現在前時猶未捨彼與無間道不相違故解道起方棄捨之第八淨識非彼依故有漏善三無記法全異𤍨生少分名所餘有漏二餘故十地中所生現行及此種類中下品種名劣無漏也十種真如十真如者一遍行真如謂此真如二空所顯無有一法而不在故二㝡勝真如謂此真如具無邊德於一切法㝡為勝故三勝流真如謂此真如所流教法於餘教法𭫸為勝故四無攝受真如謂此真如無所繫屬非我執等所依取故五類無別真如謂此真如類無差別非如眼等類有異故六無染淨真如謂此真如本性無染亦不可後方淨故七法無別真如謂此真如雖多教法種種安立而無異故八不增減真如謂此真如離增减執不隨淨染有增减故即此亦名相土自在所依真如謂若證得此真如已現相現土俱自在故九智自在所依真如謂若證得此真如已於無礙解得自在故十業自在等所依真如謂若證得此真如已普於一切神通作業摠持定門皆自在故雖真如性實無差別而隨勝德假立十種雖初地中已達一切而能證行猶未圓滿為令圓滿後後建立依詮癈詮真如妙理不可思議非言所言非識所識唯諸聖者分滿證悟謂之癈詮談旨雖然如是強寄言慮而常住一味等謂之依詮談旨變化身土於變化土有其二種一穢土二淨土穢謂瓦礫荊蕀便利臭穢等也淨謂金銀七寳池林宮閣等也唯識論十云若變化身依變化土謂成事智大慈悲力由昔所修利他無漏淨穢佛土因緣成𤏅隨未登地有情所冝化為佛土或淨或穢或小或大前後改轉佛變化身依之而住能依身量亦無定限佛土章云此土亦以有情五蘊及器界四塵等以為躰性佛變唯無漏餘有情變通有無漏第六識及所變通有無漏餘識及所變唯有漏太賢云淨穢同處隨業異見猶如四識等事心異如鶖子所見山河螺髻梵王變寶土故長時暫變於變化土而有長時淨土暫變淨土長時淨土其相可知暫變淨土謂釋迦土中無垢稱經足未按前現穢非淨足按已後暫令見淨法華時十方佛集淨而非穢未集已前穢而非淨涅槃亦言尒時三千大千世界以佛神力地皆柔軟無有𭎌塘土石沙礫亦化土攝是其暫變而已自受用土唯識論十云自受用身還依自土謂圓鏡智相應淨識由昔所修自利無漏純淨佛土因緣成熟從初成佛盡未來際相續變為純淨佛土周圓無際眾寶莊嚴自受用身常依而住如淨土量身量亦尒佛土章云唯以無漏色蘊色香味觸相續四塵間斷亦聲五塵為躰性具事相色法㓛德他受用土唯識論十云他受用身亦依自土謂平等智大慈悲力由昔所修利他無漏純淨佛土因緣成𤍨隨住十地菩薩所冝變為淨土或小或大或劣或勝前後改轉他受用身依之而住能依身量亦無定限佛土章云亦以無漏色蘊四塵五塵而為躰性亦以成十地菩薩五蘊及金銀等所成四塵等噐土以為躰性又云佛所變者定唯無漏菩薩變者通有無漏第八五識所變唯有漏第六意識或第七識及所變通有無漏有邊無邊佛地經明受用土云周圓無際其量難測佛地論有三義一有邊際一無有邊際一自受用無邊他受用有邊矣後解為正彼正義云二他受用謂諸如來為令地上諸菩薩眾受大法樂進修勝行隨冝而現或勝或劣或大或小改轉不定如變化土如是淨土以有邊故地上菩薩及諸如來皆測其量但就地前言不能測自性身土唯識論十云又自性身依法性土雖此身土體無差別而屬佛法相性異故此佛身土俱非色攝雖不可形量小大然隨事相其量無邊譬如虛空遍一切處䟽云以佛義是相謂有為㓛德法所依故眾德聚義故二身自躰故法者是性義㓛德自性故能持自性故諸法自性故躰為土義為身摩醯首羅淨居天上有他受用淨土名曰摩醯首羅即是大自在宮也第十地菩薩將成正覺必往此處若第十地滿欲受佛位所居之土非必住在自在宮處處所不定也十地經論言後報利益摩醯首羅智處生者㨿初往而問此自在宮為三界攝將否答若論處所非是三界色究竟天外有別處佛土章云土非界繫言超三界矣若論相攝即是色界攝佛土章云異𤍨識在必是三界攝何得出界矣問於論相攝即色界攝若尒為是淨居攝將否答是非淨居攝瑜伽第四云色界之中十八住處無想天者廣果天攝非別處所既云十八復言無想廣果天攝故自在宮非五淨居若淨居攝處應十七非十八也問第十地菩薩依何業力往自在宮耶答初以廣果天穢業感彼天果至生自在宮以無漏定願資令殊勝而往淨土也三身成道問三身成道為是同時將前後歟答古有二義一謂同時若不尒者應有佛果增减過三身章云故成三佛不增不減一謂異時准未親無性解釋八相化儀並事智之所現報前化後其理分明也故法華玄賛三云果道滿已住知足天乃至下生成等正覺撲揚三身章記云自在宮中成正覺已知足化身即下閻浮亦成正覺矣是當以後為正佛身餘身其相雖異並是變化身何有三身闕減失耶三種常住常有三種曰自性常曰不斷常曰相續常也自性身謂之自性常其性無為不生不也自他受用謂之不斷常有為智品雖有生無有間斷也變化身謂之相續常機緣不恒稍有間斷雖不恒會機緣無盡雖有間斷化道無絕也淨八識聚淨八識聚於自他身互相展轉皆有所緣同時心心所亦得互緣以彼㓛能遍現影故識自證分與相應見分同緣緣自見分餘淨心所義例亦然相分必無有能緣用自餘三分互緣一切故名遍緣見分緣自證分亦能緣證自證分證自證分亦能緣見分相分者唯在佛位餘者不能也三分若能遍緣一切三分差殊云何得別謂前所得者親得餘新所得影得故成差別矣果位諸識與幾心所相應謂各與二十一心所相應遍行五別境五善十一也五重唯識觀門次第從麁至細摠有五重一遣虛存實識謂觀遍計所執唯虛妄起無躰用應正遣空情有理無故觀依他圓成諸法躰實二智境界應正存有理有情無故若尒何故得言唯識唯言但愚夫所執定離諸識實有色等識言摠顯一切有情各有八識六位心所所變相見分位差別及彼空理所顯真如識自相故識相應故二所變故三分位故四實性故如是諸法皆不離識摠立識名二捨留純識謂雖觀事理皆不離識於此內識有境有心識唯內有境亦通外𢙢濫外故但言唯識三攝未歸本識謂見相二分俱依識有若離識自躰本未法必無是故攝末歸本名曰唯識四隱劣顯勝識謂心及心所俱能變現以心王勝而心所劣隱劣顯勝名為唯識五遣相證性識謂識言所表具有事理事為相用遣而不取理為性躰應求作證遣事證理名曰唯識
